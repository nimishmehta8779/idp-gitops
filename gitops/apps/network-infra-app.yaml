apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-infra
  namespace: argocd
spec:
  project: idp-platform-infra
  source:
    repoURL: https://github.com/nimishmehta8779/idp-gitops.git
    targetRevision: main
    path: infrastructure/crossplane/network
    directory:
      recurse: false
      exclude: '*claim*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
