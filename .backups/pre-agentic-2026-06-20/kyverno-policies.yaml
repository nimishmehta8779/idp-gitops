        a Job that deletes the corresponding ArgoCD cluster Secret in the argocd namespace.
      policies.kyverno.io/subject: Job
      policies.kyverno.io/title: Auto-deregister EKS Cluster from ArgoCD
    creationTimestamp: "2026-06-19T08:34:33Z"
