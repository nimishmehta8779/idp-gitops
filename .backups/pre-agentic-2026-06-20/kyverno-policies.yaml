      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"kyverno.io/v1","kind":"ClusterPolicy","metadata":{"annotations":{"argocd.argoproj.io/tracking-id":"kyverno-policies:kyverno.io/ClusterPolicy:kyverno/deregister-eks-cluster-argocd","policies.kyverno.io/category":"IDP","policies.kyverno.io/description":"When an XEKSCluster composite is deleted, generate a Job that deletes the corresponding ArgoCD cluster Secret in the argocd namespace.","policies.kyverno.io/subject":"Job","policies.kyverno.io/title":"Auto-deregister EKS Cluster from ArgoCD"},"name":"deregister-eks-cluster-argocd"},"spec":{"rules":[{"generate":{"apiVersion":"batch/v1","data":{"metadata":{"labels":{"app.kubernetes.io/managed-by":"kyverno","idp.platform.io/cluster-name":"{{ request.object.spec.parameters.clusterName }}"}},"spec":{"backoffLimit":3,"template":{"metadata":{"labels":{"app.kubernetes.io/managed-by":"kyverno","idp.platform.io/cluster-name":"{{ request.object.spec.parameters.clusterName }}"}},"spec":{"containers":[{"args":["set -euo pipefail\nCLUSTER_NAME=\"{{ request.object.spec.parameters.clusterName }}\"\necho \"==\u003e Deleting ArgoCD cluster Secret for ${CLUSTER_NAME}...\"\nkubectl delete secret \"${CLUSTER_NAME}\" -n argocd --ignore-not-found\necho \"==\u003e Done! Cluster ${CLUSTER_NAME} deregistered from ArgoCD.\"\n"],"command":["/bin/bash","-c"],"image":"bitnami/kubectl:latest","name":"deregister"}],"restartPolicy":"OnFailure","serviceAccountName":"default"}},"ttlSecondsAfterFinished":3600}},"kind":"Job","name":"deregister-argocd-{{ request.object.spec.parameters.clusterName }}","namespace":"crossplane-system","synchronize":false},"match":{"any":[{"resources":{"kinds":["platform.io/v1alpha1/XEKSCluster"],"operations":["DELETE"]}}]},"name":"generate-argocd-deregistration-job"}]}}
      policies.kyverno.io/category: IDP
