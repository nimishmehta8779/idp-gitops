apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: idp-frontend
  namespace: default
  description: Frontend Portal of the Internal Developer Platform
  annotations:
    backstage.io/source-location: url:https://github.com/company/idp-platform
spec:
  type: website
  lifecycle: production
  owner: group:default/platform-team
  system: system:default/idp-core
  dependsOn:
    - component:default/idp-backend
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: idp-backend
  namespace: default
  description: Backend APIs of the Internal Developer Platform
  annotations:
    backstage.io/source-location: url:https://github.com/company/idp-platform
spec:
  type: service
  lifecycle: production
  owner: group:default/platform-team
  system: system:default/idp-core
  dependsOn:
    - resource:default/kind-local-cluster
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: eks-provisioner
  namespace: default
  description: Automatic EKS Cluster Provisioner Service
  annotations:
    backstage.io/source-location: url:https://github.com/company/idp-platform
spec:
  type: service
  lifecycle: production
  owner: group:default/platform-team
  system: system:default/eks-provisioning
  dependsOn:
    - component:default/crossplane-eks-composition
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: backstage-portal
  namespace: default
  description: Backstage portal interface component
spec:
  type: website
  lifecycle: experimental
  owner: group:default/platform-team
  system: system:default/idp-core
  dependsOn:
    - resource:default/kind-local-cluster
    - component:default/idp-frontend
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: argocd-gitops
  namespace: default
  description: ArgoCD GitOps engine component
spec:
  type: service
  lifecycle: experimental
  owner: group:default/platform-team
  system: system:default/idp-core
  dependsOn:
    - resource:default/kind-local-cluster

