apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: decommission-eks-cluster
  title: Decommission EKS Cluster
  description: Safely decommission an existing EKS cluster with full audit trail
  tags:
    - eks
    - decommission
    - infrastructure
spec:
  owner: group:platform-team
  type: resource

  parameters:
    - title: Decommission Settings
      required:
        - teamName
        - clusterName
        - environment
        - confirmClusterName
        - decommissionReason
        - costSaving
      properties:
        teamName:
          title: Team Name
          type: string
          description: Select the owner group for the EKS cluster.
          enum:
            - platform-team
            - team-alpha
            - team-beta
        clusterName:
          title: Cluster Name
          type: string
          description: Select the EKS cluster to decommission. Only clusters owned by the selected team are shown.
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Resource
              spec.type: kubernetes-cluster
              spec.owner: group:default/${{ parameters.teamName }}
        environment:
          title: Environment
          type: string
          description: Target environment for the EKS cluster.
          enum:
            - dev
            - staging
        confirmClusterName:
          title: Confirm Cluster Name
          type: string
          ui:help: "Type the cluster name exactly to confirm decommissioning"
        decommissionReason:
          title: Decommission Reason
          type: string
          description: Explain why the cluster is being decommissioned (minimum 10 characters).
          minLength: 10
        costSaving:
          title: Estimated Monthly Cost Saving
          type: string
          description: Estimated cost savings (e.g., $300/month).
          default: "$300"
        awsRegion:
          title: AWS Region
          type: string
          default: "us-east-1"
        instanceType:
          title: Instance Type
          type: string
          default: "t3.medium"
        nodeCount:
          title: Node Count
          type: integer
          default: 2

    - title: Staging Acknowledgment
      dependencies:
        environment:
          oneOf:
            - properties:
                environment:
                  enum:
                    - dev
            - properties:
                environment:
                  enum:
                    - staging
                acknowledgeStaging:
                  type: boolean
                  title: I understand this cluster uses Orphan deletion policy and I will manually clean up AWS resources after decommissioning
                  const: true
              required:
                - acknowledgeStaging

  steps:
    # Step 1: Validate Ownership & Confirmation
    - id: validate
      name: Validate Ownership & Confirmation
      action: idp:cluster:decommission:validate
      input:
        clusterName: ${{ parameters.clusterName.split('/').pop() }}
        confirmClusterName: ${{ parameters.confirmClusterName }}
        teamName: ${{ parameters.teamName }}

    # Step 2: Render Decommission Record into Workspace
    - id: fetch_skeleton
      name: Generate Decommission Record
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: gitops/decommission-records/${{ parameters.teamName }}
        values:
          clusterName: ${{ parameters.clusterName.split('/').pop() }}
          teamName: ${{ parameters.teamName }}
          environment: ${{ parameters.environment }}
          decommissionReason: ${{ parameters.decommissionReason }}
          costSaving: ${{ parameters.costSaving }}
          awsRegion: ${{ parameters.awsRegion }}
          instanceType: ${{ parameters.instanceType }}
          nodeCount: ${{ parameters.nodeCount }}
          currentDate: ${{ now() }}

    # Step 3a: Delete claims from team infra repo (Dev)
    - id: delete_files_dev
      name: Decommission Cluster (Dev)
      if: ${{ parameters.environment == 'dev' }}
      action: github:repo:delete-file
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=${{ parameters.teamName }}-infra
        branch: main
        files:
          - eks/${{ parameters.clusterName.split('/').pop() }}.yaml
          - eks/${{ parameters.clusterName.split('/').pop() }}-catalog.yaml
        commitMessage: "chore: decommission cluster ${{ parameters.clusterName.split('/').pop() }} - ${{ parameters.decommissionReason }}"

    # Step 3b: Push decommission record to central GitOps repo (Dev)
    - id: create_audit_record_dev
      name: Commit Decommission Audit Record (Dev)
      if: ${{ parameters.environment == 'dev' }}
      action: github:repo:create-or-update-file
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=idp-gitops
        path: gitops/decommission-records/${{ parameters.teamName }}/${{ parameters.clusterName.split('/').pop() }}.md
        sourcePath: gitops/decommission-records/${{ parameters.teamName }}/${{ parameters.clusterName.split('/').pop() }}.md
        message: "chore: audit record for decommission of ${{ parameters.clusterName.split('/').pop() }}"
        branch: main

    # Step 3c: Delete claims from team infra repo (Staging)
    - id: delete_files_staging
      name: Decommission Cluster (Staging)
      if: ${{ parameters.environment == 'staging' }}
      action: github:repo:delete-file
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=${{ parameters.teamName }}-infra
        branch: decommission/${{ parameters.clusterName.split('/').pop() }}
        prTargetBranch: main
        files:
          - eks/${{ parameters.clusterName.split('/').pop() }}.yaml
          - eks/${{ parameters.clusterName.split('/').pop() }}-catalog.yaml
        commitMessage: "chore: decommission cluster ${{ parameters.clusterName.split('/').pop() }} - ${{ parameters.decommissionReason }}"
        prTitle: "[Decommission] ${{ parameters.clusterName.split('/').pop() }} - ${{ parameters.teamName }}"
        prBody: |
          ### EKS Cluster Decommission Request (Staging)
          - **Cluster Name**: `${{ parameters.clusterName.split('/').pop() }}`
          - **Team Name**: `${{ parameters.teamName }}`
          - **Environment**: `${{ parameters.environment }}`
          - **Decommission Reason**: `${{ parameters.decommissionReason }}`
          - **Estimated Monthly Cost Saving**: `${{ parameters.costSaving }}`

          ⚠️ **WARNING**: Staging clusters are configured with the `Orphan` deletion policy. Merging this PR will remove the claim file from GitOps but the actual AWS resources (VPC, subnets, EKS, node groups) will NOT be deleted automatically. 

          Platform team must manually verify and delete the AWS resources after this PR is merged.

          #### Checklist
          - [ ] Verify EKS cluster claims and resources are deleted from GitOps
          - [ ] Manually clean up AWS resources (EKS, VPC, Node Groups)
          - [ ] Verify no orphan resources remain in AWS console
        prLabels:
          - cluster-decommission
          - needs-review

    # Step 3d: Push decommission record to central GitOps repo (Staging)
    - id: create_audit_record_staging
      name: Commit Decommission Audit Record (Staging)
      if: ${{ parameters.environment == 'staging' }}
      action: github:repo:create-or-update-file
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=idp-gitops
        path: gitops/decommission-records/${{ parameters.teamName }}/${{ parameters.clusterName.split('/').pop() }}.md
        sourcePath: gitops/decommission-records/${{ parameters.teamName }}/${{ parameters.clusterName.split('/').pop() }}.md
        message: "chore: decommission audit record for ${{ parameters.clusterName.split('/').pop() }} - ${{ parameters.decommissionReason }}"
        branch: decommission/${{ parameters.clusterName.split('/').pop() }}
        prTargetBranch: main
        prTitle: "[Decommission Audit] ${{ parameters.clusterName.split('/').pop() }} - ${{ parameters.teamName }}"
        prBody: |
          ### EKS Cluster Decommission Audit Record (Staging)
          Audit record for the decommission request of `${{ parameters.clusterName.split('/').pop() }}`.
        prLabels:
          - decommission-audit
          - needs-review

    # Step 4: Unregister entity from Backstage catalog (dev only)
    - id: unregister_catalog
      name: Unregister from Backstage Catalog (Dev)
      if: ${{ parameters.environment == 'dev' }}
      action: http:backstage:request
      input:
        method: DELETE
        path: /api/catalog/entities/by-name/resource/default/${{ parameters.clusterName.split('/').pop() }}

    # Step 5: Create decommission audit record (GitHub issue)
    - id: create_audit_issue
      name: Create Decommission Audit Issue
      action: github:issues:create
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=idp-gitops
        title: "[Decommissioned] ${{ parameters.clusterName.split('/').pop() }} - ${{ parameters.teamName }}"
        body: |
          ## Cluster Decommission Record
          ─────────────────────────────────────────
          Cluster:          ${{ parameters.clusterName.split('/').pop() }}
          Team:             ${{ parameters.teamName }}
          Environment:      ${{ parameters.environment }}
          Reason:           ${{ parameters.decommissionReason }}
          Decommissioned by: ${{ user.entity.metadata.name }}
          Date:             ${{ now() }}
          ─────────────────────────────────────────
          ## Checklist
          - [ ] Claim file deleted from GitOps repo
          - [ ] Catalog entity unregistered
          - [ ] ArgoCD pruned claim from kind cluster
          - [ ] Crossplane deleted AWS resources (dev only — auto)
          - [ ] AWS resources manually verified clean (staging only)
          - [ ] Cost saving confirmed in AWS billing
          ─────────────────────────────────────────
          ## Cost saving
          Estimated monthly saving: ${{ parameters.costSaving }}

    # Step 5b: Label Audit Issue
    - id: label_issue
      name: Label Audit Issue
      action: github:issues:label
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=idp-gitops
        number: ${{ steps.create_audit_issue.output.issueNumber | int }}
        labels:
          - decommission-audit

    # Step 6: Add completion note for dev environments
    - id: completion_note_dev
      name: Decommissioning Complete (Dev)
      if: ${{ parameters.environment == 'dev' }}
      action: debug:log
      input:
        message: "Dev cluster ${{ parameters.clusterName.split('/').pop() }} claim files deleted. AWS resources will be automatically deleted by Crossplane within 2-3 minutes."

    # Step 7: Add completion note for staging environments
    - id: completion_note_staging
      name: Important: Manual Cleanup Required (Staging)
      if: ${{ parameters.environment == 'staging' }}
      action: debug:log
      input:
        message: "⚠️ Staging cluster claim deleted. AWS resources will remain due to Orphan deletion policy. See AWS console cleanup instructions below."

  output:
    links:
      - title: "Decommission audit record"
        url: https://github.com/nimishmehta8779/idp-gitops/blob/main/gitops/decommission-records/${{ parameters.teamName }}/${{ parameters.clusterName.split('/').pop() }}.md
        icon: github
      - title: "ArgoCD pruning status"
        url: http://localhost:8080/applications/${{ parameters.teamName }}-eks-clusters
        icon: dashboard
      - title: "AWS EKS Console"
        url: https://console.aws.amazon.com/eks/home?region=${{ parameters.awsRegion }}#/clusters
        icon: external-link
    text: |
      ## Cluster Decommissioning Initiated

      Cluster `${{ parameters.clusterName.split('/').pop() }}` has been marked for decommissioning.

      ### For Dev Environments
      ✅ Automated cleanup in progress:
      1. Claim files have been deleted from GitOps repository
      2. ArgoCD will detect the change and prune resources (2-3 minute sync cycle)
      3. Crossplane will automatically delete AWS resources (Delete policy)
      4. Check ArgoCD dashboard link above to monitor pruning
      5. Verify in AWS EKS console that cluster is gone (typically 5-10 minutes)

      **Expected Status Timeline:**
      - T+0min: Decommissioning template completes
      - T+2-3min: ArgoCD syncs and removes resources
      - T+5-10min: AWS cluster deletion complete

      ### For Staging Environments ⚠️
      ⚠️ **MANUAL CLEANUP REQUIRED** - Staging uses Orphan deletion policy:

      1. **Claim files have been deleted** from GitOps (automatic)
      2. **AWS resources still exist** and will incur costs (manual action needed)
      3. You must manually delete the cluster in AWS console:

         - Open [AWS EKS Console](https://console.aws.amazon.com/eks/home?region=${{ parameters.awsRegion }}#/clusters)
         - Find cluster: `${{ parameters.clusterName.split('/').pop() }}`
         - Click delete and confirm
         - Wait 15-20 minutes for deletion to complete
         - Verify VPC and related resources are also deleted

      4. After cleanup, update the audit issue with completion details

      ### Verification Checklist
      - [ ] Decommission audit record created (see link above)
      - [ ] Claim files deleted from team infra repo
      - [ ] ArgoCD application status shows pruning in progress (dev only)
      - [ ] EKS cluster no longer appears in AWS console
      - [ ] Node groups have been terminated
      - [ ] Associated IAM roles have been deleted
      - [ ] Cost center billing has been updated

      ### Need Help?
      Check the audit issue for detailed decommissioning information and checklist tracking.
