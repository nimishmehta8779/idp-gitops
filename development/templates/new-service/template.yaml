apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-backend-service-template
  title: Create New Backend Service
  description: A template to bootstrap a new backend service under the nimishmehta8779 GitHub account.
spec:
  owner: group:platform-team
  type: service

  parameters:
    - title: Basic Information
      required:
        - serviceName
        - description
        - owner
        - language
      properties:
        serviceName:
          title: Service Name
          type: string
          description: Name of the new backend service.
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: A short description of the service.
        owner:
          title: Owner
          type: string
          description: Select the owner group for the service.
          enum:
            - platform-team
            - team-alpha
            - team-beta
            - team-gamma
        language:
          title: Programming Language
          type: string
          description: Choose the programming language/framework.
          enum:
            - nodejs
            - python
            - golang

    - title: Repository Settings
      required:
        - repoName
      properties:
        repoName:
          title: GitHub Repository Name
          type: string
          description: The repository name under nimishmehta8779 on GitHub.
          default: ${{ parameters.serviceName }}

    - title: Dependencies & APIs
      properties:
        dependencies:
          title: Dependencies
          type: array
          items:
            type: string
          description: Select components or resources that this service depends on (optional)
          ui:field: MultiEntityPicker
          ui:options:
            catalogFilter:
              kind:
                - Component
                - Resource
        consumesApis:
          title: Consumed APIs
          type: array
          items:
            type: string
          description: Select APIs that this service consumes (optional)
          ui:field: MultiEntityPicker
          ui:options:
            catalogFilter:
              kind: API

  steps:
    - id: fetch-nodejs
      name: Fetch Node.js Skeleton
      if: ${{ parameters.language === 'nodejs' }}
      action: fetch:template
      input:
        url: ./skeleton-nodejs
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          language: ${{ parameters.language }}
          repoName: ${{ parameters.repoName }}
          dependencies: ${{ parameters.dependencies }}
          consumesApis: ${{ parameters.consumesApis }}

    - id: fetch-python
      name: Fetch Python Skeleton
      if: ${{ parameters.language === 'python' }}
      action: fetch:template
      input:
        url: ./skeleton-python
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          language: ${{ parameters.language }}
          repoName: ${{ parameters.repoName }}
          dependencies: ${{ parameters.dependencies }}
          consumesApis: ${{ parameters.consumesApis }}

    - id: fetch-golang
      name: Fetch Go Skeleton
      if: ${{ parameters.language === 'golang' }}
      action: fetch:template
      input:
        url: ./skeleton-golang
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          language: ${{ parameters.language }}
          repoName: ${{ parameters.repoName }}
          dependencies: ${{ parameters.dependencies }}
          consumesApis: ${{ parameters.consumesApis }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=${{ parameters.repoName }}
        defaultBranch: main

    - id: register
      name: Register in Catalog
      action: idp:catalog:register
      input:
        catalogInfoUrl: ${{ steps.publish.output.repoContentsUrl }}/catalog-info.yaml


  output:
    links:
      - title: "Open in Catalog"
        url: http://localhost:3000/catalog/default/component/${{ steps.register.output.entityRef | replace("component:default/","") }}
        icon: catalog
      - title: "View GitHub repo"
        url: ${{ steps.publish.output.remoteUrl }}
        icon: github
      - title: "CI/CD Pipeline"
        url: ${{ steps.publish.output.remoteUrl }}/actions
        icon: dashboard
