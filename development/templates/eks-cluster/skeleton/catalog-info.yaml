apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: ${{ values.clusterName }}
  description: EKS Cluster resource requested by ${{ values.teamName }}
  annotations:
    backstage.io/techdocs-ref: dir:.
    cluster-status: provisioning
    aws-region: ${{ values.awsRegion }}
    cluster-version: ${{ values.kubernetesVersion }}
    node-count: "${{ values.nodeCount }}"
    instance-type: ${{ values.instanceType }}
    environment: ${{ values.environment }}
    created-by: ${{ values.teamName }}
spec:
  type: kubernetes-cluster
  owner: group:default/${{ values.teamName }}
  system: system:default/eks-provisioning
