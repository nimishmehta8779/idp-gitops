apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: ${{ values.clusterName }}
  description: EKS Cluster resource requested by ${{ values.teamName }}
  annotations:
    aws-region: ${{ values.awsRegion }}
    environment: ${{ values.environment }}
spec:
  type: kubernetes-cluster
  owner: group:default/${{ values.teamName }}
  system: eks-provisioning
