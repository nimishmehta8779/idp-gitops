# This is a reference representation of the EKSCluster claim structure.
# The actual rendered claim is generated inside the gitops/cluster-claims/ directory.
# Note: Subnets are selected dynamically via subnetIdSelector in the composition.
apiVersion: platform.io/v1alpha1
kind: EKSCluster
metadata:
  name: ${{ values.clusterName }}
  namespace: clusters
  labels:
    team: ${{ values.teamName }}
    environment: ${{ values.environment }}
    managed-by: backstage-idp
  annotations:
    idp.platform.io/cost-acknowledged: "true"
    idp.platform.io/monthly-cost-estimate: "{% if values.instanceType == 't3.medium' %}${{ 73 + values.nodeCount * 144 }}{% elif values.instanceType == 't3.large' %}${{ 73 + values.nodeCount * 200 }}{% else %}${{ 73 + values.nodeCount * 280 }}{% endif %}"
spec:
  parameters:
    clusterName: ${{ values.clusterName }}
    region: ${{ values.awsRegion }}
    nodeInstanceType: ${{ values.instanceType }}
    nodeCount: ${{ values.nodeCount }}
    kubernetesVersion: "${{ values.kubernetesVersion }}"
    environment: ${{ values.environment }}
    teamName: ${{ values.teamName }}
    costCenter: ${{ values.costCenter }}
  writeConnectionSecretToRef:
    name: ${{ values.clusterName }}-kubeconfig
