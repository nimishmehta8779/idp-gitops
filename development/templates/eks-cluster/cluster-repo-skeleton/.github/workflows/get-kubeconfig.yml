name: Get Kubeconfig

on:
  workflow_dispatch:
    inputs:
      output_format:
        description: 'Output format (text or base64)'
        required: false
        default: 'base64'
        type: choice
        options:
          - base64
          - text

permissions:
  id-token: write
  contents: read

jobs:
  get-kubeconfig:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-${{ inputs.cluster_name || '${{ env.CLUSTER_NAME }}' }}-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EKS Kubeconfig
        id: kubeconfig
        run: |
          CLUSTER_NAME="${{ env.CLUSTER_NAME }}"
          REGION="${{ env.AWS_REGION }}"

          # Get kubeconfig
          aws eks update-kubeconfig \
            --name "$CLUSTER_NAME" \
            --region "$REGION" \
            --kubeconfig kubeconfig.yaml

          # Display kubeconfig based on format
          if [ "${{ github.event.inputs.output_format }}" = "base64" ]; then
            KUBECONFIG_B64=$(cat kubeconfig.yaml | base64 -w 0)
            echo "kubeconfig_base64=${KUBECONFIG_B64}" >> $GITHUB_OUTPUT
            echo "format=base64" >> $GITHUB_OUTPUT
          else
            cat kubeconfig.yaml >> $GITHUB_OUTPUT
            echo "format=text" >> $GITHUB_OUTPUT
          fi

          # Get cluster info
          CLUSTER_INFO=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region "$REGION")
          ENDPOINT=$(echo "$CLUSTER_INFO" | jq -r '.cluster.endpoint')
          echo "endpoint=${ENDPOINT}" >> $GITHUB_OUTPUT

      - name: Create Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # Kubeconfig Retrieved

          **Cluster**: ${{ env.CLUSTER_NAME }}
          **Region**: ${{ env.AWS_REGION }}
          **Endpoint**: ${{ steps.kubeconfig.outputs.endpoint }}

          ## How to Use

          The kubeconfig is stored as a GitHub Actions artifact and as a workflow output.

          ### Option 1: Download from Artifacts
          - Download the `kubeconfig` artifact from this run
          - Set: `export KUBECONFIG=/path/to/kubeconfig`
          - Test: `kubectl get nodes`

          ### Option 2: Use Output
          The kubeconfig is available as:
          - **Base64**: `${{ steps.kubeconfig.outputs.kubeconfig_base64 }}`
          - **Format**: `${{ steps.kubeconfig.outputs.format }}`

          ### Option 3: Via AWS CLI
          ```bash
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
          ```

          ---
          ✅ **Kubeconfig ready!** Start using your cluster.
          EOF

      - name: Upload Kubeconfig Artifact
        uses: actions/upload-artifact@v3
        with:
          name: kubeconfig-${{ env.CLUSTER_NAME }}
          path: kubeconfig.yaml
          retention-days: 1
          if-no-files-found: error

  verify-access:
    needs: get-kubeconfig
    runs-on: ubuntu-latest
    steps:
      - name: Download Kubeconfig
        uses: actions/download-artifact@v3
        with:
          name: kubeconfig-${{ env.CLUSTER_NAME }}

      - name: Verify Access
        run: |
          export KUBECONFIG=$PWD/kubeconfig.yaml

          echo "## Cluster Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get cluster info
          echo "### Cluster Info" >> $GITHUB_STEP_SUMMARY
          kubectl cluster-info >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get nodes
          echo "### Nodes" >> $GITHUB_STEP_SUMMARY
          kubectl get nodes -o wide >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get namespaces
          echo "### Namespaces" >> $GITHUB_STEP_SUMMARY
          kubectl get namespaces >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "✅ Access verified!" >> $GITHUB_STEP_SUMMARY
