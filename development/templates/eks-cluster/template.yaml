apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: request-eks-cluster
  title: Request EKS Cluster
  description: |
    Request a new EKS cluster via GitOps. The claim file is committed directly
    into your team's infra repo under eks/ where ArgoCD picks it up automatically.

    Dev clusters are provisioned immediately. Staging clusters require platform
    team approval via Pull Request before provisioning begins.
spec:
  owner: group:platform-team
  type: resource

  parameters:
    - title: Cluster Specifications
      required:
        - teamName
        - clusterName
        - environment
        - awsRegion
        - nodeCount
        - instanceType
        - kubernetesVersion
      properties:
        teamName:
          title: Team Name
          type: string
          description: Select the owner group for the EKS cluster.
          enum:
            - platform-team
            - team-alpha
            - team-beta
            - team-gamma
        clusterName:
          title: Cluster Name
          type: string
          description: Name of the EKS cluster.
          pattern: '^[a-z0-9]+-[a-z0-9]+-[a-z0-9]+-[0-9]+$'
          ui:help: 'Required format: <team>-<env>-<purpose>-<index> (e.g., alpha-dev-general-01)'
        environment:
          title: Environment
          type: string
          description: Target environment for the EKS cluster.
          enum:
            - dev
            - staging
        awsRegion:
          title: AWS Region
          type: string
          description: AWS region to provision the cluster in.
          default: us-east-1
        nodeCount:
          title: Node Count
          type: integer
          description: Number of worker nodes in the cluster (1-10).
          default: 2
          minimum: 1
          maximum: 10
        instanceType:
          title: Instance Type
          type: string
          description: EC2 instance type for worker nodes.
          enum:
            - t3.medium
            - t3.large
            - m5.large
        kubernetesVersion:
          title: Kubernetes Version
          type: string
          description: Kubernetes version for the EKS cluster.
          default: "1.34"
          enum:
            - "1.34"
            - "1.33"
        costCenter:
          title: Cost Center
          type: string
          description: Cost center identifier for billing/accounting purposes.
          default: default

  steps:
    # Step 1: Render skeleton
    - id: fetch
      name: Render cluster claim
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./eks
        values:
          teamName: ${{ parameters.teamName }}
          clusterName: ${{ parameters.clusterName }}
          environment: ${{ parameters.environment }}
          awsRegion: ${{ parameters.awsRegion }}
          kubernetesVersion: ${{ parameters.kubernetesVersion }}
          nodeCount: ${{ parameters.nodeCount }}
          instanceType: ${{ parameters.instanceType }}
          costCenter: ${{ parameters.costCenter }}

    # Step 2a: Dev — push claim file directly to team infra repo main branch
    - id: push-claim-dev
      name: Push claim to team infra repo (dev)
      if: ${{ parameters.environment === 'dev' }}
      action: github:repo:create-or-update-file
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=${{ parameters.teamName }}-infra
        path: eks/${{ parameters.clusterName }}.yaml
        sourcePath: eks/claim.yaml
        message: |
          feat(eks): add ${{ parameters.clusterName }} cluster claim

          Team: ${{ parameters.teamName }}
          Environment: dev
          Instance: ${{ parameters.instanceType }} x${{ parameters.nodeCount }}
        branch: main
        committerName: Backstage IDP
        committerEmail: idp@platform.io

    # Step 2b: Push catalog file to team infra repo (dev)
    - id: push-catalog-dev
      name: Push catalog entity to team infra repo (dev)
      if: ${{ parameters.environment === 'dev' }}
      action: github:repo:create-or-update-file
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=${{ parameters.teamName }}-infra
        path: eks/${{ parameters.clusterName }}-catalog.yaml
        sourcePath: eks/catalog.yaml
        message: "feat(eks): add ${{ parameters.clusterName }} catalog entity"
        branch: main
        committerName: Backstage IDP
        committerEmail: idp@platform.io

    # Step 2c: Staging — open PR in team infra repo
    - id: push-claim-staging
      name: Open PR in team infra repo (staging)
      if: ${{ parameters.environment === 'staging' }}
      action: github:repo:create-or-update-file
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=${{ parameters.teamName }}-infra
        path: eks/${{ parameters.clusterName }}.yaml
        sourcePath: eks/claim.yaml
        message: "feat(eks): add ${{ parameters.clusterName }} cluster claim (staging)"
        branch: cluster-request/${{ parameters.clusterName }}
        committerName: Backstage IDP
        committerEmail: idp@platform.io
        prTargetBranch: main
        prTitle: "[Cluster Request] ${{ parameters.clusterName }} (${{ parameters.teamName }})"
        prBody: |
          ## EKS Cluster Request
          ─────────────────────────────────────────
          | Field | Value |
          |---|---|
          | Cluster | `${{ parameters.clusterName }}` |
          | Team | `${{ parameters.teamName }}` |
          | Environment | staging |
          | Region | `${{ parameters.awsRegion }}` |
          | Kubernetes version | `${{ parameters.kubernetesVersion }}` |
          | Node count | `${{ parameters.nodeCount }}` |
          | Instance type | `${{ parameters.instanceType }}` |
          ─────────────────────────────────────────
          ## Checklist for platform team
          - [ ] Node count appropriate for staging workload
          - [ ] Instance type approved
          - [ ] Cost acknowledged by team lead
          - [ ] No existing staging cluster for this team that could be reused
        prLabels:
          - cluster-request
          - needs-review

    # Step 3: Wait for GitHub indexing (dev only)
    - id: wait-for-github
      name: Wait for GitHub indexing
      if: ${{ parameters.environment === 'dev' }}
      action: debug:wait
      input:
        seconds: 5

    # Step 4: Register catalog entity (dev only — staging registers after PR merge)
    - id: register
      name: Register in Backstage catalog
      if: ${{ parameters.environment === 'dev' }}
      action: idp:catalog:register
      input:
        catalogInfoUrl: https://github.com/nimishmehta8779/${{ parameters.teamName }}-infra/blob/main/eks/${{ parameters.clusterName }}-catalog.yaml

    # Step 5: Post instructions for staging
    - id: staging-instructions
      name: Staging PR instructions
      if: ${{ parameters.environment === 'staging' }}
      action: debug:wait
      input:
        seconds: 1

  output:
    links:
      - title: Team infra repo
        url: https://github.com/nimishmehta8779/${{ parameters.teamName }}-infra
      - title: ArgoCD sync status
        url: http://localhost:8080/applications/${{ parameters.teamName }}-eks-clusters
      - title: Pull Request (staging only)
        url: ${{ steps['push-claim-staging'].output.remoteUrl }}
        if: ${{ parameters.environment === 'staging' }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
        if: ${{ parameters.environment === 'dev' }}
