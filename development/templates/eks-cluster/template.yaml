apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: request-eks-cluster
  title: Request EKS Cluster
  description: |
    A template to request a new EKS cluster using Crossplane and GitOps.

    Network infrastructure (VPC, subnets) is provisioned and managed by the
    platform team. Your cluster will be placed in the shared network for your
    requested environment automatically.
spec:
  owner: group:platform-team
  type: resource

  parameters:
    - title: Cluster Specifications
      required:
        - teamName
        - clusterName
        - environment
        - awsRegion
        - nodeCount
        - instanceType
        - kubernetesVersion
      properties:
        teamName:
          title: Team Name
          type: string
          description: Select the owner group for the EKS cluster.
          enum:
            - platform-team
            - team-alpha
            - team-beta
        clusterName:
          title: Cluster Name
          type: string
          description: Name of the EKS cluster.
          pattern: '^[a-z0-9]+-[a-z0-9]+-[a-z0-9]+-[0-9]+$'
          ui:help: 'Required format: <team>-<env>-<purpose>-<index> (e.g., alpha-dev-general-01)'
          ui:validation: 'Must match the format <team>-<env>-<purpose>-<index> (e.g., alpha-dev-general-01).'
        environment:
          title: Environment
          type: string
          description: Target environment for the EKS cluster.
          enum:
            - dev
            - staging
        awsRegion:
          title: AWS Region
          type: string
          description: AWS region to provision the cluster in.
          default: us-east-1
        nodeCount:
          title: Node Count
          type: integer
          description: Number of worker nodes in the cluster (1-10).
          default: 2
          minimum: 1
          maximum: 10
        instanceType:
          title: Instance Type
          type: string
          description: EC2 instance type for worker nodes.
          enum:
            - t3.medium
            - t3.large
            - m5.large
        kubernetesVersion:
          title: Kubernetes Version
          type: string
          description: Kubernetes version for the EKS cluster.
          default: "1.34"
          enum:
            - "1.34"
            - "1.33"
        costCenter:
          title: Cost Center
          type: string
          description: Cost center identifier for billing/accounting purposes.
          default: default
        components:
          title: Requesting Components
          type: array
          items:
            type: string
          description: Select components that will depend on this EKS cluster (optional)
          ui:field: MultiEntityPicker
          ui:options:
            catalogFilter:
              kind: Component
              spec.owner: group:default/${{ parameters.teamName }}


  steps:
    - id: fetch_base
      name: Fetch Base Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./eks/${{ parameters.clusterName }}
        values:
          teamName: ${{ parameters.teamName }}
          clusterName: ${{ parameters.clusterName }}
          environment: ${{ parameters.environment }}
          awsRegion: ${{ parameters.awsRegion }}
          nodeCount: ${{ parameters.nodeCount }}
          instanceType: ${{ parameters.instanceType }}
          kubernetesVersion: ${{ parameters.kubernetesVersion }}
          costCenter: ${{ parameters.costCenter }}
          components: ${{ parameters.components }}
          createdAt: ${{ now() }}

    # Publish Dev: Commit directly to main of the team infra repo
    - id: publish_dev
      name: Commit Cluster Claim (Dev)
      if: ${{ parameters.environment == 'dev' }}
      action: github:repo:delete-file
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=${{ parameters.teamName }}-infra
        filesToCreate:
          - "eks/${{ parameters.clusterName }}/claim.yaml"
          - "eks/${{ parameters.clusterName }}/catalog-info.yaml"
          - "eks/${{ parameters.clusterName }}/mkdocs.yml"
          - "eks/${{ parameters.clusterName }}/docs/index.md"
          - "eks/${{ parameters.clusterName }}/README.md"
        commitMessage: "infra: add EKS cluster ${{ parameters.clusterName }} claim and metadata (dev)"
        branch: main

    # Publish Staging: Commit to a branch and open a PR
    - id: publish_staging
      name: Create Staging Pull Request
      if: ${{ parameters.environment == 'staging' }}
      action: github:repo:delete-file
      input:
        repoUrl: github.com?owner=nimishmehta8779&repo=${{ parameters.teamName }}-infra
        filesToCreate:
          - "eks/${{ parameters.clusterName }}/claim.yaml"
          - "eks/${{ parameters.clusterName }}/catalog-info.yaml"
          - "eks/${{ parameters.clusterName }}/mkdocs.yml"
          - "eks/${{ parameters.clusterName }}/docs/index.md"
          - "eks/${{ parameters.clusterName }}/README.md"
        commitMessage: "infra: request EKS cluster ${{ parameters.clusterName }} (staging)"
        branch: cluster-request/${{ parameters.clusterName }}
        prTargetBranch: main
        prTitle: "[Cluster Request] ${{ parameters.clusterName }} - ${{ parameters.teamName }}"
        prBody: |
          ### EKS Cluster Request Details
          - **Cluster Name**: `${{ parameters.clusterName }}`
          - **Team Name**: `${{ parameters.teamName }}`
          - **Environment**: `${{ parameters.environment }}`
          - **AWS Region**: `${{ parameters.awsRegion }}`
          - **Node Count**: `${{ parameters.nodeCount }}`
          - **Instance Type**: `${{ parameters.instanceType }}`
          
          Please review the Crossplane EKSCluster claim details before merging.
        prLabels:
          - cluster-request
          - needs-review

    # Wait for GitHub to index files
    - id: wait_for_github
      name: Wait for GitHub Indexing
      if: ${{ parameters.environment == 'dev' }}
      action: debug:wait
      input:
        seconds: 5

    # Register in Backstage Catalog (Dev only)
    - id: register_dev
      name: Register in Catalog (Dev)
      if: ${{ parameters.environment == 'dev' }}
      action: idp:catalog:register
      input:
        catalogInfoUrl: https://github.com/nimishmehta8779/${{ parameters.teamName }}-infra/blob/main/eks/${{ parameters.clusterName }}/catalog-info.yaml

  output:
    links:
      - title: Team Infrastructure Repository
        url: https://github.com/nimishmehta8779/${{ parameters.teamName }}-infra
      - title: Pull Request
        url: ${{ steps.publish_staging.output.pullRequestUrl }}
        if: ${{ parameters.environment == 'staging' }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register_dev.output.entityRef }}
        if: ${{ parameters.environment == 'dev' }}
