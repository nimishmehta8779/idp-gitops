name: Register Catalog Entities

on:
  push:
    branches:
      - main
    paths:
      - '**/catalog-info.yaml'
      - '**/catalog-info.yml'
      - 'eks/*.yaml'

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: {% raw %}${{ secrets.APP_ID }}{% endraw %}
          private-key: {% raw %}${{ secrets.APP_PRIVATE_KEY }}{% endraw %}

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: {% raw %}${{ steps.app-token.outputs.token }}{% endraw %}
          persist-credentials: false
          fetch-depth: 0

      - name: Add approval annotation
        env:
          GH_TOKEN: {% raw %}${{ steps.app-token.outputs.token }}{% endraw %}
        run: |
          # Get PR merger (approver)
          APPROVER=""
          
          # Check if there is an associated merged PR for this commit
          APPROVER=$(gh pr list --state merged --limit 1 --json number,mergeCommit --jq ".[] | select(.mergeCommit.oid == \"{% raw %}${{ github.sha }}{% endraw %}\") | .mergedBy.login" 2>/dev/null || true)
          
          if [ -z "$APPROVER" ]; then
            echo "No PR approver/merger found. Skipping approval annotation update."
            exit 0
          fi
          
          echo "Approver detected: $APPROVER"
          
          # Find changed EKS claim files
          CHANGED_CLAIMS=$(git diff --name-only HEAD~1 HEAD | grep -E '^eks/[^/]+\.yaml$' || true)
          
          if [ -z "$CHANGED_CLAIMS" ]; then
            echo "No changed EKS claims in this commit."
            exit 0
          fi
          
          echo "Changed EKS claims: $CHANGED_CLAIMS"
          
          # Setup git config
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          UPDATED=false
          for file in $CHANGED_CLAIMS; do
            if [ -f "$file" ]; then
              # Check if the annotation already exists and has the same value to avoid redundant commits
              CURRENT_VAL=$(yq e ".metadata.annotations[\"idp.platform.io/approved-by\"]" "$file")
              if [ "$CURRENT_VAL" = "$APPROVER" ]; then
                echo "File $file already annotated with approved-by: $APPROVER. Skipping."
                continue
              fi
              
              # Add annotation to the claim file
              yq e ".metadata.annotations[\"idp.platform.io/approved-by\"] = \"$APPROVER\"" -i "$file"
              git add "$file"
              UPDATED=true
            fi
          done
          
          if [ "$UPDATED" = "true" ]; then
            git commit -m "chore: add approval annotation (approved by $APPROVER) [skip ci]"
            git push origin HEAD:main
          else
            echo "No updates to commit."
          fi

      - name: Register with Backstage Catalog
        uses: actions/github-script@v6
        env:
          BACKSTAGE_URL: 'http://localhost:7007'
          BACKSTAGE_TOKEN: {% raw %}${{ secrets.BACKSTAGE_TOKEN }}{% endraw %}
        with:
          script: |
            const execSync = require('child_process').execSync;
            const beforeSha = context.payload.before;
            const afterSha = context.payload.after;
            
            let diff = [];
            try {
              // Try git diff between before and after commits
              diff = execSync(`git diff --name-only ${beforeSha} ${afterSha}`).toString().trim().split('\n');
            } catch (e) {
              try {
                // Fallback to diff of last commit
                diff = execSync(`git diff --name-only HEAD~1 HEAD`).toString().trim().split('\n');
              } catch (err) {
                console.log('Could not determine git diff. Registering root catalog-info.yaml.');
                diff = ['catalog-info.yaml'];
              }
            }
            
            const catalogFiles = diff.filter(file => file.endsWith('catalog-info.yaml') || file.endsWith('catalog-info.yml'));
            console.log(`Found changed catalog-info files: ${catalogFiles.join(', ')}`);
            
            const registeredUrls = [];
            const backstageUrl = process.env.BACKSTAGE_URL || 'http://localhost:7007';
            const backstageToken = process.env.BACKSTAGE_TOKEN || '';
            
            const headers = {
              'Content-Type': 'application/json',
            };
            if (backstageToken) {
              headers['Authorization'] = `Bearer ${backstageToken}`;
            }
            
            for (const file of catalogFiles) {
              const targetUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/${file}`;
              console.log(`Registering location: ${targetUrl}`);
              
              try {
                const res = await fetch(`${backstageUrl}/api/catalog/locations`, {
                  method: 'POST',
                  headers: headers,
                  body: JSON.stringify({
                    type: 'url',
                    target: targetUrl
                  })
                });
                
                if (res.ok) {
                  console.log(`Successfully registered: ${targetUrl}`);
                  registeredUrls.push(targetUrl);
                } else if (res.status === 409) {
                  console.log(`Location is already registered: ${targetUrl}`);
                  registeredUrls.push(targetUrl);
                } else {
                  const text = await res.text();
                  console.error(`Failed to register location ${targetUrl}: ${res.status} ${res.statusText} - ${text}`);
                }
              } catch (err) {
                console.error(`Network error registering location ${targetUrl}: ${err.message}`);
              }
            }
            
            // Post confirmation comment on the associated Pull Request if found
            try {
              const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
              
              const pr = pullRequests[0];
              if (pr && registeredUrls.length > 0) {
                let commentBody = '### 🚀 Catalog Registration Confirmed\n\n';
                commentBody += 'The following catalog entities have been registered with the Backstage catalog API:\n';
                registeredUrls.forEach(url => {
                  commentBody += `- [catalog-info.yaml](${url})\n`;
                });
                
                await github.rest.issues.createComment({
                  issue_number: pr.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: commentBody
                });
                console.log(`Successfully posted PR comment on PR #${pr.number}`);
              }
            } catch (err) {
              console.log(`Failed to post PR comment: ${err.message}`);
            }
