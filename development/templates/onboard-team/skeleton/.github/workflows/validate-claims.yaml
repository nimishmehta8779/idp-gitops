name: Validate Claims

on:
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run validation script
        id: run_validation
        env:
          BASE_REF: {% raw %}${{ github.base_ref }}{% endraw %}
        run: |
          git fetch origin $BASE_REF
          export CHANGED_FILES=$(git diff --name-only origin/$BASE_REF...HEAD)
          python - <<'EOF' > validation_report.json
          import os
          import sys
          import yaml
          import re
          import json

          approved_instances = ['t3.medium', 't3.large', 'm5.large']
          errors = []
          cost_estimates = {}
          deleted_staging_files = []

          changed_files = os.environ.get('CHANGED_FILES', '').split()

          for file_path in changed_files:
              if not file_path.endswith('.yaml') and not file_path.endswith('.yml'):
                  continue
              
              if not os.path.exists(file_path):
                  if "-staging-" in file_path or "/staging/" in file_path:
                      deleted_staging_files.append(file_path)
                  continue
                  
              try:
                  with open(file_path, 'r') as f:
                      docs = yaml.safe_load_all(f)
                      for doc in docs:
                          if not doc or not isinstance(doc, dict):
                              continue
                          
                          kind = doc.get('kind', '')
                          metadata = doc.get('metadata', {})
                          name = metadata.get('name', '')
                          labels = metadata.get('labels', {})
                          annotations = metadata.get('annotations', {})
                          spec = doc.get('spec', {})
                          params = spec.get('parameters', {})
                          
                          # Validate name
                          if not re.match(r'^[a-z]+-(dev|staging)-[a-z]+-[0-9]{2}$', name):
                              errors.append(f"Resource name `{name}` does not match pattern `^[a-z]+-(dev|staging)-[a-z]+-[0-9]{2}$` in `{file_path}`")
                          
                          # Validate labels
                          for label in ['team', 'environment', 'managed-by']:
                              if label not in labels:
                                  errors.append(f"Missing required label `{label}` under `metadata.labels` in `{file_path}`")
                          
                          # Validate cost acknowledgement
                          if annotations.get('idp.platform.io/cost-acknowledged') != 'true':
                              errors.append(f"Missing required annotation `idp.platform.io/cost-acknowledged: \"true\"` in `{file_path}`")
                          
                          if kind == 'EKSCluster':
                              env = params.get('environment', labels.get('environment', ''))
                              node_count = params.get('nodeCount')
                              instance_type = params.get('nodeInstanceType')
                              
                              if instance_type not in approved_instances:
                                  errors.append(f"Instance type `{instance_type}` is not in the approved list: {approved_instances} in `{file_path}`")
                              
                              if node_count is not None:
                                  try:
                                      nodes = int(node_count)
                                      if env == 'dev' and not (1 <= nodes <= 10):
                                          errors.append(f"Node count `{nodes}` is out of bounds for dev (must be 1-10) in `{file_path}`")
                                      elif env == 'staging' and not (1 <= nodes <= 6):
                                          errors.append(f"Node count `{nodes}` is out of bounds for staging (must be 1-6) in `{file_path}`")
                                  except ValueError:
                                      errors.append(f"Invalid nodeCount `{node_count}` in `{file_path}`")
                                      nodes = 0
                              else:
                                  errors.append(f"Missing nodeCount under spec.parameters in `{file_path}`")
                                  nodes = 0
                                  
                              if instance_type == 't3.medium':
                                  cost = 73 + nodes * 144
                              elif instance_type == 't3.large':
                                  cost = 73 + nodes * 200
                              else:
                                  cost = 73 + nodes * 280
                              cost_estimates[name] = f"${cost}/month"
              except Exception as e:
                  errors.append(f"Failed to parse YAML file `{file_path}`: {str(e)}")

          report = {
              "errors": errors,
              "cost_estimates": cost_estimates,
              "deleted_staging_files": deleted_staging_files
          }
          print(json.dumps(report, indent=2))
          EOF

      - name: Post validation comment
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('validation_report.json', 'utf8'));
            
            let commentBody = '### 🛠️ Infrastructure Claim Validation Results\n\n';
            let hasFailures = report.errors.length > 0;
            
            if (hasFailures) {
              commentBody += '#### ❌ Validation Failures\n';
              report.errors.forEach(err => {
                commentBody += `- ${err}\n`;
              });
              commentBody += '\nPlease fix these issues before merging.\n\n';
            } else {
              commentBody += '#### ✅ All validation checks passed successfully!\n\n';
            }
            
            if (Object.keys(report.cost_estimates).length > 0) {
              commentBody += '#### 💰 Cost Estimates\n';
              commentBody += '| Resource Name | Monthly Cost Estimate |\n';
              commentBody += '| --- | --- |\n';
              for (const [name, cost] of Object.entries(report.cost_estimates)) {
                commentBody += `| ${name} | ${cost} |\n`;
              }
              commentBody += '\n';
            }
            
            if (report.deleted_staging_files.length > 0) {
              commentBody += '#### ⚠️ WARNING: Deletion of Staging Infrastructure\n';
              commentBody += 'The following staging infrastructure files are being deleted. This will trigger resource deprovisioning (teardown) in AWS:\n';
              report.deleted_staging_files.forEach(file => {
                commentBody += `- \`${file}\`\n`;
              });
              commentBody += '\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
            
            if (hasFailures) {
              core.setFailed('Infrastructure claim validation failed.');
            }
