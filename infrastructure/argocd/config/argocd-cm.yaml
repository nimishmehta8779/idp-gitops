apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  accounts.admin: apiKey, login
  accounts.caipe: apiKey, login
  admin.enabled: 'true'
  application.instanceLabelKey: argocd.argoproj.io/instance
  application.sync.impersonation.enabled: 'false'
  exec.enabled: 'false'
  statusbadge.enabled: 'false'
  timeout.hard.reconciliation: 0s
  timeout.reconciliation: 120s
  timeout.reconciliation.jitter: 60s
  url: https://argocd.example.com

  # ---------------------------------------------------------------------------
  # Crossplane composite resource health checks
  # Shows "Progressing" in ArgoCD while AWS resources are being provisioned,
  # and "Healthy" only once the Crossplane Ready condition is True.
  # ---------------------------------------------------------------------------

  # XEKSCluster (composite) — the top-level claim wrapper
  resource.customizations.health.platform.io_XEKSCluster: |
    hs = {}
    if obj.status ~= nil and obj.status.conditions ~= nil then
      for _, c in ipairs(obj.status.conditions) do
        if c.type == "Ready" then
          if c.status == "True" then
            hs.status = "Healthy"
            hs.message = "EKS cluster is ready"
          else
            hs.status = "Progressing"
            hs.message = c.message or "EKS cluster provisioning in progress..."
          end
          return hs
        end
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for EKS cluster provisioning to start..."
    return hs

  # EKSCluster claim (namespace-scoped, what teams actually create)
  resource.customizations.health.platform.io_EKSCluster: |
    hs = {}
    if obj.status ~= nil and obj.status.conditions ~= nil then
      for _, c in ipairs(obj.status.conditions) do
        if c.type == "Ready" then
          if c.status == "True" then
            hs.status = "Healthy"
            hs.message = "EKS cluster is ready"
          else
            hs.status = "Progressing"
            hs.message = c.message or "Waiting for composite resource to become Ready..."
          end
          return hs
        end
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for EKS cluster provisioning to start..."
    return hs

  # AWS EKS Cluster managed resource (eks.aws.upbound.io)
  resource.customizations.health.eks.aws.upbound.io_Cluster: |
    hs = {}
    if obj.status ~= nil then
      atProvider = obj.status.atProvider or {}
      clusterStatus = atProvider.status or ""
      if clusterStatus == "ACTIVE" then
        hs.status = "Healthy"
        hs.message = "EKS cluster is ACTIVE"
        return hs
      elseif clusterStatus == "CREATING" then
        hs.status = "Progressing"
        hs.message = "EKS control plane creating (this takes ~10 min)..."
        return hs
      elseif clusterStatus == "DELETING" then
        hs.status = "Progressing"
        hs.message = "EKS cluster is being deleted..."
        return hs
      elseif clusterStatus == "FAILED" then
        hs.status = "Degraded"
        hs.message = "EKS cluster creation FAILED"
        return hs
      end
      -- Check Crossplane Synced condition for errors
      if obj.status.conditions ~= nil then
        for _, c in ipairs(obj.status.conditions) do
          if c.type == "Synced" and c.status == "False" then
            hs.status = "Degraded"
            hs.message = c.message or "Crossplane sync error"
            return hs
          end
        end
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for EKS cluster to appear in AWS..."
    return hs

  # AWS EKS NodeGroup managed resource
  resource.customizations.health.eks.aws.upbound.io_NodeGroup: |
    hs = {}
    if obj.status ~= nil then
      atProvider = obj.status.atProvider or {}
      ngStatus = atProvider.status or ""
      if ngStatus == "ACTIVE" then
        hs.status = "Healthy"
        hs.message = "Node group is ACTIVE"
        return hs
      elseif ngStatus == "CREATING" or ngStatus == "UPDATING" then
        hs.status = "Progressing"
        hs.message = "Node group " .. ngStatus:lower() .. "..."
        return hs
      elseif ngStatus == "DEGRADED" or ngStatus == "CREATE_FAILED" then
        hs.status = "Degraded"
        hs.message = "Node group is " .. ngStatus
        return hs
      elseif ngStatus == "DELETING" then
        hs.status = "Progressing"
        hs.message = "Node group is being deleted..."
        return hs
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for node group provisioning..."
    return hs

  # AWS EKS Addon managed resource
  resource.customizations.health.eks.aws.upbound.io_Addon: |
    hs = {}
    if obj.status ~= nil then
      atProvider = obj.status.atProvider or {}
      addonStatus = atProvider.status or ""
      if addonStatus == "ACTIVE" then
        hs.status = "Healthy"
        hs.message = "Addon is ACTIVE"
        return hs
      elseif addonStatus == "CREATING" or addonStatus == "UPDATING" then
        hs.status = "Progressing"
        hs.message = "Addon " .. addonStatus:lower() .. "..."
        return hs
      elseif addonStatus == "DEGRADED" or addonStatus == "CREATE_FAILED" then
        hs.status = "Degraded"
        hs.message = "Addon is " .. addonStatus
        return hs
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for addon provisioning..."
    return hs

  # ---------------------------------------------------------------------------
  # Existing ignore/exclusion rules (unchanged)
  # ---------------------------------------------------------------------------
  resource.customizations.ignoreResourceUpdates.ConfigMap: |
    jqPathExpressions:
      # Ignore the cluster-autoscaler status
      - '.metadata.annotations."cluster-autoscaler.kubernetes.io/last-updated"'
      # Ignore the annotation of the legacy Leases election
      - '.metadata.annotations."control-plane.alpha.kubernetes.io/leader"'
  resource.customizations.ignoreResourceUpdates.Endpoints: |
    jsonPointers:
      - /metadata
      - /subsets
  resource.customizations.ignoreResourceUpdates.all: |
    jsonPointers:
      - /status
  resource.customizations.ignoreResourceUpdates.apps_ReplicaSet: |
    jqPathExpressions:
      - '.metadata.annotations."deployment.kubernetes.io/desired-replicas"'
      - '.metadata.annotations."deployment.kubernetes.io/max-replicas"'
      - '.metadata.annotations."rollout.argoproj.io/desired-replicas"'
  resource.customizations.ignoreResourceUpdates.argoproj.io_Application: |
    jqPathExpressions:
      - '.metadata.annotations."notified.notifications.argoproj.io"'
      - '.metadata.annotations."argocd.argoproj.io/refresh"'
      - '.metadata.annotations."argocd.argoproj.io/hydrate"'
      - '.operation'
  resource.customizations.ignoreResourceUpdates.argoproj.io_Rollout: |
    jqPathExpressions:
      - '.metadata.annotations."notified.notifications.argoproj.io"'
  resource.customizations.ignoreResourceUpdates.autoscaling_HorizontalPodAutoscaler: |
    jqPathExpressions:
      - '.metadata.annotations."autoscaling.alpha.kubernetes.io/behavior"'
      - '.metadata.annotations."autoscaling.alpha.kubernetes.io/conditions"'
      - '.metadata.annotations."autoscaling.alpha.kubernetes.io/metrics"'
      - '.metadata.annotations."autoscaling.alpha.kubernetes.io/current-metrics"'
  resource.customizations.ignoreResourceUpdates.discovery.k8s.io_EndpointSlice: |
    jsonPointers:
      - /metadata
      - /endpoints
      - /ports
  resource.exclusions: |
    ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
    - apiGroups:
      - ''
      - discovery.k8s.io
      kinds:
      - Endpoints
      - EndpointSlice
    ### Internal Kubernetes resources excluded reduce the number of watched events
    - apiGroups:
      - coordination.k8s.io
      kinds:
      - Lease
    ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
    - apiGroups:
      - authentication.k8s.io
      - authorization.k8s.io
      kinds:
      - SelfSubjectReview
      - TokenReview
      - LocalSubjectAccessReview
      - SelfSubjectAccessReview
      - SelfSubjectRulesReview
      - SubjectAccessReview
    ### Intermediate Certificate Request excluded reduce the number of watched events
    - apiGroups:
      - certificates.k8s.io
      kinds:
      - CertificateSigningRequest
    - apiGroups:
      - cert-manager.io
      kinds:
      - CertificateRequest
    ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
    - apiGroups:
      - cilium.io
      kinds:
      - CiliumIdentity
      - CiliumEndpoint
      - CiliumEndpointSlice
    ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
    - apiGroups:
      - kyverno.io
      - reports.kyverno.io
      - wgpolicyk8s.io
      kinds:
      - PolicyReport
      - ClusterPolicyReport
      - EphemeralReport
      - ClusterEphemeralReport
      - AdmissionReport
      - ClusterAdmissionReport
      - BackgroundScanReport
      - ClusterBackgroundScanReport
      - UpdateRequest
