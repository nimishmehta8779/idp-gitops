apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: team-eks-clusters-staging
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - repo: team-alpha-infra
            team: team-alpha
          - repo: team-beta-infra
            team: team-beta
          - repo: team-gamma-infra
            team: team-gamma

  template:
    metadata:
      name: '{{team}}-eks-clusters-staging'
      labels:
        team: '{{team}}'
        managed-by: argocd-applicationset
    spec:
      project: idp-platform-staging
      source:
        repoURL: 'https://github.com/nimishmehta8779/{{repo}}'
        targetRevision: main
        path: .
        directory:
          recurse: true
          include: '*-staging-*.yaml'
          exclude: '{.gitkeep,catalog-info.yaml}'
      destination:
        server: https://kubernetes.default.svc
        namespace: clusters-staging
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
      ignoreDifferences:
        - group: platform.io
          kind: XEKSCluster
          jsonPointers:
            - /status
            - /metadata/annotations/crossplane.io
