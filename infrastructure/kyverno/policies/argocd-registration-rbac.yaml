---
# ClusterRole granting the crossplane-system/default SA everything needed
# by the ArgoCD cluster registration Job:
#   - create/get/patch Secrets in argocd namespace
#   - get/list XEKSClusters (to find the composite name)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-cluster-registration
  labels:
    app.kubernetes.io/managed-by: idp
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update", "delete"]
  - apiGroups: ["platform.io"]
    resources: ["xeksclusters", "xeksclusters/status"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-cluster-registration
  labels:
    app.kubernetes.io/managed-by: idp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-cluster-registration
subjects:
  - kind: ServiceAccount
    name: default
    namespace: crossplane-system
