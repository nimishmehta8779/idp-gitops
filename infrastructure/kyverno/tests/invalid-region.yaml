apiVersion: platform.io/v1alpha1
kind: EKSCluster
metadata:
  name: test-invalid-region
  namespace: clusters
  labels:
    team: team-alpha
    environment: dev
    managed-by: backstage-idp
  annotations:
    idp.platform.io/cost-acknowledged: "true"
spec:
