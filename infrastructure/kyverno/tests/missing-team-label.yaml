apiVersion: platform.io/v1alpha1
kind: EKSCluster
metadata:
  name: test-missing-team
  namespace: clusters
  labels:
    environment: dev
    managed-by: backstage-idp
  annotations:
    idp.platform.io/cost-acknowledged: 'true'
spec:
  parameters:
    clusterName: test-missing-team
    region: us-east-1
    nodeInstanceType: t3.medium
    nodeCount: 2
    kubernetesVersion: '1.34'
    environment: dev
    teamName: team-alpha
    costCenter: default
    networkRef: dev-network
  writeConnectionSecretToRef:
    name: test-missing-team-kubeconfig
