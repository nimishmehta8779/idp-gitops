version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: backstage-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: backstage_plugin_catalog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backstage:
    build:
      context: ./backstage
      dockerfile: Dockerfile.dev
    container_name: backstage-app
    ports:
      - "3000:3000"
      - "7007:7007"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      NODE_ENV: development
      GITHUB_APP_PRIVATE_KEY_PATH: /app/secrets/github-app-private-key.pem
      KUBERNETES_PROXY_URL: http://kube-proxy:8001
      APP_PORT: 3000
      HOST: 0.0.0.0
    env_file:
      - ./backstage/.env
    volumes:
      - ./backstage:/app
      - ../development:/development
      - infrastructure_node-modules:/app/node_modules
      - infrastructure_app-node-modules:/app/packages/app/node_modules
      - infrastructure_backend-node-modules:/app/packages/backend/node_modules
    depends_on:
      - db

  caipe:
    image: ghcr.io/cnoe-io/ai-platform-engineering:0.5.13
    container_name: caipe
    ports:
      - "8082:8000"
    environment:
      LLM_PROVIDER: google-gemini
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      LLM_MODEL: gemini-2.5-flash
      GOOGLE_GEMINI_MODEL_NAME: gemini-2.5-flash
      EXTERNAL_URL: http://localhost:8082
      ARGOCD_AGENT_ENABLED: "true"
      ARGOCD_URL: http://backstage-dev-control-plane:30080
      ARGOCD_TOKEN: ${ARGOCD_TOKEN}
      GITHUB_AGENT_ENABLED: "true"
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID}
      GITHUB_APP_PRIVATE_KEY_PATH: /app/secrets/github-app-private-key.pem
      KUBERNETES_AGENT_ENABLED: "true"
      KUBECONFIG_BASE64: ${KUBECONFIG_BASE64}
      JIRA_AGENT_ENABLED: "false"
      ENABLE_STREAMING: "false"
    volumes:
      - ./backstage/secrets:/app/secrets:ro
    env_file:
      - ./backstage/.env
      - ../.env
    networks:
      - default
      - kind
    depends_on:
      - db
    command: platform-engineer

volumes:
  pgdata:
  infrastructure_node-modules:
  infrastructure_app-node-modules:
  infrastructure_backend-node-modules:

networks:
  kind:
    external: true
    name: kind
