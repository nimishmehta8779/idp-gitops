apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xnetworks.platform.io
spec:
  group: platform.io
  names:
    kind: XNetwork
    plural: xnetworks
  claimNames:
    kind: Network
    plural: networks
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    environment:
                      type: string
                      enum: [dev, staging]
                    region:
                      type: string
                      default: us-east-1
                    vpcCidr:
                      type: string
                    subnetACidr:
                      type: string
                    subnetBCidr:
                      type: string
                    enableNatGateway:
                      type: boolean
                      default: false
                  required: [environment]
                writeConnectionSecretToRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
              required: [parameters]
            status:
              type: object
              properties:
                vpcId:
                  type: string
                subnetAId:
                  type: string
                subnetBId:
                  type: string
                routeTableId:
                  type: string
                internetGatewayId:
                  type: string
  connectionSecretKeys:
    - vpcId
    - subnetAId
    - subnetBId
    - routeTableId
    - internetGatewayId
