apiVersion: platform.io/v1alpha1
kind: Network
metadata:
  name: idp-dev-network
  namespace: platform-network
  labels:
    environment: dev
    team: platform-team
    managed-by: crossplane
  annotations:
    idp.platform.io/cost-acknowledged: "true"
    idp.platform.io/monthly-cost-estimate: "$5"
spec:
  parameters:
    environment: dev
    region: us-east-1
    vpcCidr: "10.0.0.0/16"
    subnetACidr: "10.0.1.0/24"
    subnetBCidr: "10.0.2.0/24"
    enableNatGateway: false
  compositionRef:
    name: network-composition
  writeConnectionSecretToRef:
    name: idp-dev-network-connection
