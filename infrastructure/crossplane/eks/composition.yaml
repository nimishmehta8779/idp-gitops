apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: eks-cluster
  labels:
    guide: crossplane-eks
spec:
  compositeTypeRef:
    apiVersion: platform.io/v1alpha1
    kind: XEKSCluster
  resources:
  # VPC
  - name: vpc
    base:
      apiVersion: ec2.aws.upbound.io/v1beta1
      kind: VPC
      spec:
        forProvider:
          cidrBlock: 10.0.0.0/16
    patches:
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "metadata.name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-vpc"
    - fromFieldPath: "spec.parameters.teamName"
      toFieldPath: "spec.forProvider.tags[\"team\"]"
    - fromFieldPath: "spec.parameters.environment"
      toFieldPath: "spec.forProvider.tags[\"environment\"]"
  # Subnet A
  - name: subnet-a
    base:
      apiVersion: ec2.aws.upbound.io/v1beta1
      kind: Subnet
      spec:
        forProvider:
          cidrBlock: 10.0.1.0/24
          availabilityZone: ""
    patches:
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "metadata.name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-subnet-a"
    - fromFieldPath: "spec.parameters.teamName"
      toFieldPath: "spec.forProvider.tags[\"team\"]"
    - fromFieldPath: "spec.parameters.environment"
      toFieldPath: "spec.forProvider.tags[\"environment\"]"
    - fromFieldPath: "spec.parameters.region"
      toFieldPath: "spec.forProvider.availabilityZone"
      transforms:
      - type: string
        string:
          fmt: "{{ .region }}a"
    - type: FromCompositeFieldPath
      fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.vpcIdRef"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-vpc"
  # Subnet B
  - name: subnet-b
    base:
      apiVersion: ec2.aws.upbound.io/v1beta1
      kind: Subnet
      spec:
        forProvider:
          cidrBlock: 10.0.2.0/24
          availabilityZone: ""
    patches:
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "metadata.name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-subnet-b"
    - fromFieldPath: "spec.parameters.teamName"
      toFieldPath: "spec.forProvider.tags[\"team\"]"
    - fromFieldPath: "spec.parameters.environment"
      toFieldPath: "spec.forProvider.tags[\"environment\"]"
    - fromFieldPath: "spec.parameters.region"
      toFieldPath: "spec.forProvider.availabilityZone"
      transforms:
      - type: string
        string:
          fmt: "{{ .region }}b"
    - type: FromCompositeFieldPath
      fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.vpcIdRef"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-vpc"
  # Internet Gateway
  - name: igw
    base:
      apiVersion: ec2.aws.upbound.io/v1beta1
      kind: InternetGateway
    patches:
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "metadata.name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-igw"
    - type: FromCompositeFieldPath
      fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.vpcIdRef"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-vpc"
  # Route Table
  - name: route-table
    base:
      apiVersion: ec2.aws.upbound.io/v1beta1
      kind: RouteTable
      spec:
        forProvider:
          routes:
          - destinationCidrBlock: 0.0.0.0/0
            gatewayIdSelector:
              matchLabels:
                crossplane.io/name: "{{ .metadata.name }}-igw"
    patches:
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "metadata.name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-rt"
    - type: FromCompositeFieldPath
      fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.vpcIdRef"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-vpc"
    # associate both subnets
    - fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.associations[0].subnetIdSelector.matchLabels.crossplane.io/name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-subnet-a"
    - fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.associations[1].subnetIdSelector.matchLabels.crossplane.io/name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-subnet-b"
  # EKS Cluster
  - name: eks-cluster
    base:
      apiVersion: eks.aws.upbound.io/v1beta1
      kind: Cluster
      spec:
        forProvider:
          version: "1.29"
    patches:
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "metadata.name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}"
    - fromFieldPath: "spec.parameters.kubernetesVersion"
      toFieldPath: "spec.forProvider.version"
    - fromFieldPath: "spec.parameters.region"
      toFieldPath: "spec.forProvider.region"
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "spec.forProvider.roleArn"
      # role will be created later and referenced by name
    - type: FromCompositeFieldPath
      fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.vpcConfigSubnetIds"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-subnet-a,{{ .clusterName }}-subnet-b"
    - type: FromCompositeFieldPath
      fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.vpcConfigSecurityGroupIds"
      # placeholder – will be created automatically by default SG
  # IAM Role for node group
  - name: nodegroup-role
    base:
      apiVersion: iam.aws.upbound.io/v1beta1
      kind: Role
      spec:
        forProvider:
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "ec2.amazonaws.com"},
                "Action": "sts:AssumeRole"
              }]
            }
    patches:
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "metadata.name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-node-role"
    - fromFieldPath: "spec.parameters.teamName"
      toFieldPath: "spec.forProvider.tags[\"team\"]"
    - fromFieldPath: "spec.parameters.environment"
      toFieldPath: "spec.forProvider.tags[\"environment\"]"
    # Managed policies attachment is done via a separate resource (omitted for brevity)
  # Node Group
  - name: node-group
    base:
      apiVersion: eks.aws.upbound.io/v1beta1
      kind: NodeGroup
      spec:
        forProvider:
          nodeRole: ""
          instanceTypes: []
          scalingConfig:
            desiredSize: 2
            minSize: 1
            maxSize: 10
    patches:
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "metadata.name"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-node-group"
    - fromFieldPath: "spec.parameters.clusterName"
      toFieldPath: "spec.forProvider.clusterName"
    - fromFieldPath: "spec.parameters.nodeInstanceType"
      toFieldPath: "spec.forProvider.instanceTypes[0]"
    - fromFieldPath: "spec.parameters.nodeCount"
      toFieldPath: "spec.forProvider.scalingConfig.desiredSize"
    - fromFieldPath: "spec.parameters.nodeCount"
      toFieldPath: "spec.forProvider.scalingConfig.minSize"
    - fromFieldPath: "spec.parameters.nodeCount"
      toFieldPath: "spec.forProvider.scalingConfig.maxSize"
    - fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.nodeRole"
      transforms:
      - type: string
        string:
          fmt: "{{ .clusterName }}-node-role"
