apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: eks-cluster
  labels:
    guide: crossplane-eks
  annotations:
    idp.platform.io/depends-on: "xnetworks.platform.io"
    idp.platform.io/network-must-exist: "true"
    idp.platform.io/network-ref-field: "spec.parameters.networkRef"
spec:
  compositeTypeRef:
    apiVersion: platform.io/v1alpha1
    kind: XEKSCluster
  mode: Pipeline
  pipeline:
    - step: environment-configs
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                mode: Single
                matchLabels:
                  - key: environment
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.parameters.environment
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: eks-cluster
            readinessChecks:
              - type: MatchString
                fieldPath: status.atProvider.status
                matchString: ACTIVE
            base:
              apiVersion: eks.aws.upbound.io/v1beta1
              kind: Cluster
              spec:
                forProvider:
                  version: '1.34'
                  vpcConfig:
                    - subnetIdSelector:
                        matchLabels:
                          managed-by: crossplane
                  tags:
                    managed-by: crossplane
                    provisioned-by: backstage-idp
            patches:
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s'
              - fromFieldPath: spec.parameters.kubernetesVersion
                toFieldPath: spec.forProvider.version
              - fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.region
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.environment
                    - fromFieldPath: spec.parameters.clusterName
                  strategy: string
                  string:
                    fmt: idp-%s-%s-cluster-role
                toFieldPath: spec.forProvider.roleArnRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.environment
                toFieldPath: 
                  spec.forProvider.vpcConfig[0].subnetIdSelector.matchLabels.environment
          # Decoupled network integration: selecting subnets by environment rather than direct networkRef name matching
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.identity[0].oidc[0].issuer
                toFieldPath: status.oidcIssuer
              - type: PatchSet
                patchSetName: mandatory-tags
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
          - name: nodegroup-role
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: Role
              spec:
                forProvider:
                  assumeRolePolicy: "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\"\
                    : [{\n    \"Effect\": \"Allow\",\n    \"Principal\": {\"Service\"\
                    : \"ec2.amazonaws.com\"},\n    \"Action\": \"sts:AssumeRole\"\n\
                    \  }]\n}\n"
                  tags:
                    managed-by: crossplane
                    provisioned-by: backstage-idp
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.environment
                    - fromFieldPath: spec.parameters.clusterName
                  strategy: string
                  string:
                    fmt: idp-%s-%s-node-role
                toFieldPath: metadata.name
              - fromFieldPath: spec.parameters.teamName
                toFieldPath: spec.forProvider.tags["team"]
              - fromFieldPath: spec.parameters.environment
                toFieldPath: spec.forProvider.tags["environment"]
              - type: PatchSet
                patchSetName: mandatory-tags
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
          - name: node-group
            readinessChecks:
              - type: MatchString
                fieldPath: status.atProvider.status
                matchString: ACTIVE
            base:
              apiVersion: eks.aws.upbound.io/v1beta1
              kind: NodeGroup
              spec:
                forProvider:
                  instanceTypes: []
                  scalingConfig:
                    - desiredSize: 2
                      minSize: 1
                      maxSize: 10
                  amiType: AL2023_x86_64_STANDARD
                  subnetIdSelector:
                    matchLabels:
                      managed-by: crossplane
                  tags:
                    managed-by: crossplane
                    provisioned-by: backstage-idp
            patches:
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s-node-group'
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: spec.forProvider.clusterName
              - fromFieldPath: spec.parameters.nodeInstanceType
                toFieldPath: spec.forProvider.instanceTypes[0]
              - fromFieldPath: spec.parameters.nodeCount
                toFieldPath: spec.forProvider.scalingConfig[0].desiredSize
              - fromFieldPath: spec.parameters.nodeCount
                toFieldPath: spec.forProvider.scalingConfig[0].minSize
              - fromFieldPath: spec.parameters.nodeCount
                toFieldPath: spec.forProvider.scalingConfig[0].maxSize
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.environment
                    - fromFieldPath: spec.parameters.clusterName
                  strategy: string
                  string:
                    fmt: idp-%s-%s-node-role
                toFieldPath: spec.forProvider.nodeRoleArnRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.environment
                toFieldPath: 
                  spec.forProvider.subnetIdSelector.matchLabels.environment
              - type: PatchSet
                patchSetName: regional-resource
              - type: PatchSet
                patchSetName: mandatory-tags
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
          - name: cluster-role
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: Role
              spec:
                forProvider:
                  assumeRolePolicy: "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\"\
                    : [{\n    \"Effect\": \"Allow\",\n    \"Principal\": {\"Service\"\
                    : \"eks.amazonaws.com\"},\n    \"Action\": \"sts:AssumeRole\"\n\
                    \  }]\n}\n"
                  tags:
                    managed-by: crossplane
                    provisioned-by: backstage-idp
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.environment
                    - fromFieldPath: spec.parameters.clusterName
                  strategy: string
                  string:
                    fmt: idp-%s-%s-cluster-role
                toFieldPath: metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.teamName
                toFieldPath: spec.forProvider.tags["team"]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.environment
                toFieldPath: spec.forProvider.tags["environment"]
              - type: PatchSet
                patchSetName: mandatory-tags
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
          - name: cluster-role-attachment
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: RolePolicyAttachment
              spec:
                forProvider:
                  policyArn: arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s-cluster-role-attachment'
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.environment
                    - fromFieldPath: spec.parameters.clusterName
                  strategy: string
                  string:
                    fmt: idp-%s-%s-cluster-role
                toFieldPath: spec.forProvider.roleRef.name
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
          - name: nodegroup-policy-workernode
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: RolePolicyAttachment
              spec:
                forProvider:
                  policyArn: arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s-node-policy-workernode'
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.environment
                    - fromFieldPath: spec.parameters.clusterName
                  strategy: string
                  string:
                    fmt: idp-%s-%s-node-role
                toFieldPath: spec.forProvider.roleRef.name
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
          - name: nodegroup-policy-cni
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: RolePolicyAttachment
              spec:
                forProvider:
                  policyArn: arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s-node-policy-cni'
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.environment
                    - fromFieldPath: spec.parameters.clusterName
                  strategy: string
                  string:
                    fmt: idp-%s-%s-node-role
                toFieldPath: spec.forProvider.roleRef.name
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
          - name: nodegroup-policy-registry
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: RolePolicyAttachment
              spec:
                forProvider:
                  policyArn: 
                    arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s-node-policy-registry'
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.environment
                    - fromFieldPath: spec.parameters.clusterName
                  strategy: string
                  string:
                    fmt: idp-%s-%s-node-role
                toFieldPath: spec.forProvider.roleRef.name
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
          - name: oidc-provider
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: OpenIDConnectProvider
              spec:
                forProvider:
                  clientIdList:
                    - sts.amazonaws.com
                  url: ''
                  thumbprintList:
                    - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280
                    - 06b25927c42a721631c1efd9431e648fa62e1e39
                  tags:
                    managed-by: crossplane
                    provisioned-by: backstage-idp
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["backstage.io/owned"]
                toFieldPath: spec.forProvider.tags["backstage.io/owned"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["backstage.io/team"]
                toFieldPath: spec.forProvider.tags["backstage.io/team"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["environment"]
                toFieldPath: spec.forProvider.tags["environment"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["managed-by"]
                toFieldPath: spec.forProvider.tags["managed-by"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["provisioned-by"]
                toFieldPath: spec.forProvider.tags["provisioned-by"]
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s-oidc'
              - type: FromCompositeFieldPath
                fromFieldPath: status.oidcIssuer
                toFieldPath: spec.forProvider.url
                policy:
                  fromFieldPath: Required
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.arn
                toFieldPath: status.oidcProviderArn
              - type: PatchSet
                patchSetName: mandatory-tags
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
          - name: addon-vpc-cni
            base:
              apiVersion: eks.aws.upbound.io/v1beta1
              kind: Addon
              spec:
                forProvider:
                  addonName: vpc-cni
                  clusterName: ''
                  resolveConflicts: OVERWRITE
                  tags:
                    managed-by: crossplane
                    provisioned-by: backstage-idp
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["backstage.io/owned"]
                toFieldPath: spec.forProvider.tags["backstage.io/owned"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["backstage.io/team"]
                toFieldPath: spec.forProvider.tags["backstage.io/team"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["environment"]
                toFieldPath: spec.forProvider.tags["environment"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["managed-by"]
                toFieldPath: spec.forProvider.tags["managed-by"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["provisioned-by"]
                toFieldPath: spec.forProvider.tags["provisioned-by"]
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s-vpc-cni'
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: spec.forProvider.clusterName
              - type: PatchSet
                patchSetName: mandatory-tags
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
              - type: PatchSet
                patchSetName: regional-resource
          - name: addon-kube-proxy
            base:
              apiVersion: eks.aws.upbound.io/v1beta1
              kind: Addon
              spec:
                forProvider:
                  addonName: kube-proxy
                  clusterName: ''
                  resolveConflicts: OVERWRITE
                  tags:
                    managed-by: crossplane
                    provisioned-by: backstage-idp
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["backstage.io/owned"]
                toFieldPath: spec.forProvider.tags["backstage.io/owned"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["backstage.io/team"]
                toFieldPath: spec.forProvider.tags["backstage.io/team"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["environment"]
                toFieldPath: spec.forProvider.tags["environment"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["managed-by"]
                toFieldPath: spec.forProvider.tags["managed-by"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["provisioned-by"]
                toFieldPath: spec.forProvider.tags["provisioned-by"]
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s-kube-proxy'
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: spec.forProvider.clusterName
              - type: PatchSet
                patchSetName: mandatory-tags
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
              - type: PatchSet
                patchSetName: regional-resource
          - name: addon-coredns
            base:
              apiVersion: eks.aws.upbound.io/v1beta1
              kind: Addon
              spec:
                forProvider:
                  addonName: coredns
                  clusterName: ''
                  resolveConflicts: OVERWRITE
                  tags:
                    managed-by: crossplane
                    provisioned-by: backstage-idp
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["backstage.io/owned"]
                toFieldPath: spec.forProvider.tags["backstage.io/owned"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["backstage.io/team"]
                toFieldPath: spec.forProvider.tags["backstage.io/team"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["environment"]
                toFieldPath: spec.forProvider.tags["environment"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["managed-by"]
                toFieldPath: spec.forProvider.tags["managed-by"]
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["provisioned-by"]
                toFieldPath: spec.forProvider.tags["provisioned-by"]
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: '%s-coredns'
              - fromFieldPath: spec.parameters.clusterName
                toFieldPath: spec.forProvider.clusterName
              - type: PatchSet
                patchSetName: mandatory-tags
              - type: PatchSet
                patchSetName: deletion-policy
              - type: PatchSet
                patchSetName: provider-config-ref
              - type: PatchSet
                patchSetName: regional-resource
        patchSets:
          - name: regional-resource
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.region
          - name: mandatory-tags
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.environment
                toFieldPath: spec.forProvider.tags["environment"]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.teamName
                toFieldPath: spec.forProvider.tags["team"]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.clusterName
                toFieldPath: spec.forProvider.tags["cluster-name"]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.costCenter
                toFieldPath: spec.forProvider.tags["cost-center"]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.kubernetesVersion
                toFieldPath: spec.forProvider.tags["kubernetes-version"]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.tags["region"]
          - name: deletion-policy
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.environment
                toFieldPath: spec.deletionPolicy
                transforms:
                  - type: map
                    map:
                      dev: Delete
                      staging: Orphan
          - name: provider-config-ref
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.environment
                toFieldPath: spec.providerConfigRef.name
                transforms:
                  - type: map
                    map:
                      dev: aws-dev
                      staging: aws-staging
    - step: go-templating
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $p := .observed.composite.resource.spec.parameters }}
            {{- $env := $p.environment }}
            {{- $cluster := $p.clusterName }}
            {{- $hasStatus := index .observed.composite.resource "status" }}
            {{- $oidcArn := "" }}
            {{- $oidcIssuer := "" }}
            {{- if $hasStatus }}
            {{-   if index .observed.composite.resource.status "oidcProviderArn" }}
            {{-     $oidcArn = .observed.composite.resource.status.oidcProviderArn }}
            {{-   end }}
            {{-   if index .observed.composite.resource.status "oidcIssuer" }}
            {{-     $oidcIssuer = .observed.composite.resource.status.oidcIssuer }}
            {{-   end }}
            {{- end }}
            {{- $issuer := replace "https://" "" $oidcIssuer }}
            {{- $ready := and $oidcArn $oidcIssuer }}

            {{- if and $p.enableEbsCsi $ready }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: Role
            metadata:
              name: idp-{{ $env }}-{{ $cluster }}-ebs-role
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ebs-csi-role
            spec:
              providerConfigRef:
                name: aws-{{ $env }}
              deletionPolicy: {{ if eq $env "dev" }}Delete{{ else }}Orphan{{ end }}
              forProvider:
                assumeRolePolicy: |
                  {
                    "Version": "2012-10-17",
                    "Statement": [
                      {
                        "Effect": "Allow",
                        "Principal": { "Federated": "{{ $oidcArn }}" },
                        "Action": "sts:AssumeRoleWithWebIdentity",
                        "Condition": {
                          "StringEquals": {
                            "{{ $issuer }}:sub": "system:serviceaccount:kube-system:ebs-csi-controller-sa",
                            "{{ $issuer }}:aud": "sts.amazonaws.com"
                          }
                        }
                      }
                    ]
                  }
                tags:
                  managed-by: crossplane
                  provisioned-by: backstage-idp
                  environment: {{ $env }}
                  team: {{ $p.teamName }}
                  cluster-name: {{ $cluster }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: RolePolicyAttachment
            metadata:
              name: {{ $cluster }}-ebs-attach
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ebs-csi-role-attachment
            spec:
              providerConfigRef:
                name: aws-{{ $env }}
              deletionPolicy: {{ if eq $env "dev" }}Delete{{ else }}Orphan{{ end }}
              forProvider:
                policyArn: arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
                roleRef:
                  name: idp-{{ $env }}-{{ $cluster }}-ebs-role
            ---
            apiVersion: eks.aws.upbound.io/v1beta1
            kind: Addon
            metadata:
              name: {{ $cluster }}-ebs-csi
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: addon-aws-ebs-csi-driver
            spec:
              providerConfigRef:
                name: aws-{{ $env }}
              deletionPolicy: {{ if eq $env "dev" }}Delete{{ else }}Orphan{{ end }}
              forProvider:
                addonName: aws-ebs-csi-driver
                clusterName: {{ $cluster }}
                resolveConflicts: OVERWRITE
                serviceAccountRoleArnRef:
                  name: idp-{{ $env }}-{{ $cluster }}-ebs-role
                region: {{ $p.region }}
                tags:
                  managed-by: crossplane
                  provisioned-by: backstage-idp
                  environment: {{ $env }}
                  team: {{ $p.teamName }}
                  cluster-name: {{ $cluster }}
            {{- end }}

            {{- if and $p.enableClusterAutoscaler $ready }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: Role
            metadata:
              name: idp-{{ $env }}-{{ $cluster }}-autoscaler-role
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: autoscaler-irsa-role
            spec:
              providerConfigRef:
                name: aws-{{ $env }}
              deletionPolicy: {{ if eq $env "dev" }}Delete{{ else }}Orphan{{ end }}
              forProvider:
                assumeRolePolicy: |
                  {
                    "Version": "2012-10-17",
                    "Statement": [
                      {
                        "Effect": "Allow",
                        "Principal": { "Federated": "{{ $oidcArn }}" },
                        "Action": "sts:AssumeRoleWithWebIdentity",
                        "Condition": {
                          "StringEquals": {
                            "{{ $issuer }}:sub": "system:serviceaccount:kube-system:cluster-autoscaler-aws-cluster-autoscaler",
                            "{{ $issuer }}:aud": "sts.amazonaws.com"
                          }
                        }
                      }
                    ]
                  }
                inlinePolicy:
                  - name: cluster-autoscaler
                    policy: |
                      {
                        "Version": "2012-10-17",
                        "Statement": [
                          {
                            "Effect": "Allow",
                            "Action": [
                              "autoscaling:DescribeAutoScalingGroups",
                              "autoscaling:DescribeAutoScalingInstances",
                              "autoscaling:DescribeLaunchConfigurations",
                              "autoscaling:DescribeScalingActivities",
                              "autoscaling:DescribeTags",
                              "autoscaling:SetDesiredCapacity",
                              "autoscaling:TerminateInstanceInAutoScalingGroup",
                              "ec2:DescribeImages",
                              "ec2:DescribeInstanceTypes",
                              "ec2:DescribeLaunchTemplateVersions",
                              "ec2:GetInstanceTypesFromInstanceRequirements",
                              "eks:DescribeNodegroup"
                            ],
                            "Resource": "*"
                          }
                        ]
                      }
                tags:
                  managed-by: crossplane
                  provisioned-by: backstage-idp
                  environment: {{ $env }}
                  team: {{ $p.teamName }}
                  cluster-name: {{ $cluster }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: RolePolicyAttachment
            metadata:
              name: {{ $cluster }}-autoscaler-attach
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: autoscaler-irsa-role-attachment
            spec:
              providerConfigRef:
                name: aws-{{ $env }}
              deletionPolicy: {{ if eq $env "dev" }}Delete{{ else }}Orphan{{ end }}
              forProvider:
                policyArn: arn:aws:iam::aws:policy/AutoScalingFullAccess
                roleRef:
                  name: idp-{{ $env }}-{{ $cluster }}-autoscaler-role
            {{- end }}

            {{- if and $p.enableEbsCsi $ready }}
            # EFS CSI IRSA - reuses enableEbsCsi toggle per spec
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: Role
            metadata:
              name: idp-{{ $env }}-{{ $cluster }}-efs-role
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: efs-csi-irsa-role
            spec:
              providerConfigRef:
                name: aws-{{ $env }}
              deletionPolicy: {{ if eq $env "dev" }}Delete{{ else }}Orphan{{ end }}
              forProvider:
                assumeRolePolicy: |
                  {
                    "Version": "2012-10-17",
                    "Statement": [
                      {
                        "Effect": "Allow",
                        "Principal": { "Federated": "{{ $oidcArn }}" },
                        "Action": "sts:AssumeRoleWithWebIdentity",
                        "Condition": {
                          "StringEquals": {
                            "{{ $issuer }}:sub": "system:serviceaccount:kube-system:efs-csi-controller-sa",
                            "{{ $issuer }}:aud": "sts.amazonaws.com"
                          }
                        }
                      }
                    ]
                  }
                tags:
                  managed-by: crossplane
                  provisioned-by: backstage-idp
                  environment: {{ $env }}
                  team: {{ $p.teamName }}
                  cluster-name: {{ $cluster }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: RolePolicyAttachment
            metadata:
              name: {{ $cluster }}-efs-attach
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: efs-csi-irsa-role-attachment
            spec:
              providerConfigRef:
                name: aws-{{ $env }}
              deletionPolicy: {{ if eq $env "dev" }}Delete{{ else }}Orphan{{ end }}
              forProvider:
                policyArn: arn:aws:iam::aws:policy/service-role/AmazonEFSCSIDriverPolicy
                roleRef:
                  name: idp-{{ $env }}-{{ $cluster }}-efs-role
            {{- end }}

            {{- if and $p.enableExternalDNS $ready }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: Role
            metadata:
              name: idp-{{ $env }}-{{ $cluster }}-externaldns-role
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: externaldns-irsa-role
            spec:
              providerConfigRef:
                name: aws-{{ $env }}
              deletionPolicy: {{ if eq $env "dev" }}Delete{{ else }}Orphan{{ end }}
              forProvider:
                assumeRolePolicy: |
                  {
                    "Version": "2012-10-17",
                    "Statement": [
                      {
                        "Effect": "Allow",
                        "Principal": { "Federated": "{{ $oidcArn }}" },
                        "Action": "sts:AssumeRoleWithWebIdentity",
                        "Condition": {
                          "StringEquals": {
                            "{{ $issuer }}:sub": "system:serviceaccount:kube-system:external-dns",
                            "{{ $issuer }}:aud": "sts.amazonaws.com"
                          }
                        }
                      }
                    ]
                  }
                inlinePolicy:
                  - name: external-dns
                    policy: |
                      {
                        "Version": "2012-10-17",
                        "Statement": [
                          {
                            "Effect": "Allow",
                            "Action": ["route53:ChangeResourceRecordSets"],
                            "Resource": "arn:aws:route53:::hostedzone/*"
                          },
                          {
                            "Effect": "Allow",
                            "Action": [
                              "route53:ListHostedZones",
                              "route53:ListResourceRecordSets",
                              "route53:ListTagsForResource"
                            ],
                            "Resource": "*"
                          }
                        ]
                      }
                tags:
                  managed-by: crossplane
                  provisioned-by: backstage-idp
                  environment: {{ $env }}
                  team: {{ $p.teamName }}
                  cluster-name: {{ $cluster }}
            {{- end }}

            {{- if and $p.enableVelero $ready }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: Role
            metadata:
              name: idp-{{ $env }}-{{ $cluster }}-velero-role
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: velero-irsa-role
            spec:
              providerConfigRef:
                name: aws-{{ $env }}
              deletionPolicy: {{ if eq $env "dev" }}Delete{{ else }}Orphan{{ end }}
              forProvider:
                assumeRolePolicy: |
                  {
                    "Version": "2012-10-17",
                    "Statement": [
                      {
                        "Effect": "Allow",
                        "Principal": { "Federated": "{{ $oidcArn }}" },
                        "Action": "sts:AssumeRoleWithWebIdentity",
                        "Condition": {
                          "StringEquals": {
                            "{{ $issuer }}:sub": "system:serviceaccount:velero:velero",
                            "{{ $issuer }}:aud": "sts.amazonaws.com"
                          }
                        }
                      }
                    ]
                  }
                inlinePolicy:
                  - name: velero
                    policy: |
                      {
                        "Version": "2012-10-17",
                        "Statement": [
                          {
                            "Effect": "Allow",
                            "Action": [
                              "ec2:DescribeVolumes",
                              "ec2:DescribeSnapshots",
                              "ec2:CreateTags",
                              "ec2:CreateVolume",
                              "ec2:CreateSnapshot",
                              "ec2:DeleteSnapshot"
                            ],
                            "Resource": "*"
                          },
                          {
                            "Effect": "Allow",
                            "Action": [
                              "s3:GetObject",
                              "s3:DeleteObject",
                              "s3:PutObject",
                              "s3:AbortMultipartUpload",
                              "s3:ListMultipartUploadParts"
                            ],
                            "Resource": "arn:aws:s3:::{{ $cluster }}-velero-backups/*"
                          },
                          {
                            "Effect": "Allow",
                            "Action": ["s3:ListBucket"],
                            "Resource": "arn:aws:s3:::{{ $cluster }}-velero-backups"
                          }
                        ]
                      }
                tags:
                  managed-by: crossplane
                  provisioned-by: backstage-idp
                  environment: {{ $env }}
                  team: {{ $p.teamName }}
                  cluster-name: {{ $cluster }}
            {{- end }}
    - step: auto-ready
      functionRef:
        name: function-auto-ready
