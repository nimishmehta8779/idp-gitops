apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: eks-cluster
  labels:
    guide: crossplane-eks
spec:
  compositeTypeRef:
    apiVersion: platform.io/v1alpha1
    kind: XEKSCluster
  mode: Pipeline
  pipeline:
  - step: patch-and-transform
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: vpc
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: VPC
          spec:
            forProvider:
              cidrBlock: 10.0.0.0/16
        patches:
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-vpc'
        - fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags["team"]
        - fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags["environment"]
        - type: PatchSet
          patchSetName: regional-resource
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: subnet-a
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: Subnet
          spec:
            forProvider:
              cidrBlock: 10.0.1.0/24
              availabilityZone: ''
              mapPublicIpOnLaunch: true
        patches:
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-subnet-a'
        - fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags["team"]
        - fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags["environment"]
        - fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.availabilityZone
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%sa'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.vpcIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-vpc'
        - type: PatchSet
          patchSetName: regional-resource
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: subnet-b
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: Subnet
          spec:
            forProvider:
              cidrBlock: 10.0.2.0/24
              availabilityZone: ''
              mapPublicIpOnLaunch: true
        patches:
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-subnet-b'
        - fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags["team"]
        - fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags["environment"]
        - fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.availabilityZone
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%sb'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.vpcIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-vpc'
        - type: PatchSet
          patchSetName: regional-resource
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: igw
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: InternetGateway
        patches:
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-igw'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.vpcIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-vpc'
        - type: PatchSet
          patchSetName: regional-resource
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: route-table
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: RouteTable
          spec:
            forProvider: {}
        patches:
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-rt'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.vpcIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-vpc'
        - type: PatchSet
          patchSetName: regional-resource
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: eks-cluster
        base:
          apiVersion: eks.aws.upbound.io/v1beta1
          kind: Cluster
          spec:
            forProvider:
              version: '1.34'
        patches:
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s'
        - fromFieldPath: spec.parameters.kubernetesVersion
          toFieldPath: spec.forProvider.version
        - fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.roleArnRef.name
          type: FromCompositeFieldPath
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-cluster-role'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.vpcConfig[0].subnetIdRefs[0].name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-subnet-a'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.vpcConfig[0].subnetIdRefs[1].name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-subnet-b'
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.identity[0].oidc[0].issuer
          toFieldPath: status.oidcIssuer
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: nodegroup-role
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Role
          spec:
            forProvider:
              assumeRolePolicy: "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\"\
                : [{\n    \"Effect\": \"Allow\",\n    \"Principal\": {\"Service\"\
                : \"ec2.amazonaws.com\"},\n    \"Action\": \"sts:AssumeRole\"\n  }]\n\
                }\n"
        patches:
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-node-role'
        - fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags["team"]
        - fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags["environment"]
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: node-group
        base:
          apiVersion: eks.aws.upbound.io/v1beta1
          kind: NodeGroup
          spec:
            forProvider:
              instanceTypes: []
              scalingConfig:
              - desiredSize: 2
                minSize: 1
                maxSize: 10
              amiType: AL2023_x86_64_STANDARD
        patches:
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-node-group'
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.clusterName
        - fromFieldPath: spec.parameters.nodeInstanceType
          toFieldPath: spec.forProvider.instanceTypes[0]
        - fromFieldPath: spec.parameters.nodeCount
          toFieldPath: spec.forProvider.scalingConfig[0].desiredSize
        - fromFieldPath: spec.parameters.nodeCount
          toFieldPath: spec.forProvider.scalingConfig[0].minSize
        - fromFieldPath: spec.parameters.nodeCount
          toFieldPath: spec.forProvider.scalingConfig[0].maxSize
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.nodeRoleArnRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-node-role'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.subnetIdRefs[0].name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-subnet-a'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.subnetIdRefs[1].name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-subnet-b'
        - type: PatchSet
          patchSetName: regional-resource
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: route-to-igw
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: Route
          spec:
            forProvider:
              destinationCidrBlock: 0.0.0.0/0
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-route-igw'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.routeTableIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-rt'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.gatewayIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-igw'
        - type: PatchSet
          patchSetName: regional-resource
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: rta-subnet-a
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: RouteTableAssociation
          spec:
            forProvider: {}
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-rta-a'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.routeTableIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-rt'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.subnetIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-subnet-a'
        - type: PatchSet
          patchSetName: regional-resource
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: rta-subnet-b
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: RouteTableAssociation
          spec:
            forProvider: {}
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-rta-b'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.routeTableIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-rt'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.subnetIdRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-subnet-b'
        - type: PatchSet
          patchSetName: regional-resource
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: cluster-role
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Role
          spec:
            forProvider:
              assumeRolePolicy: "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\"\
                : [{\n    \"Effect\": \"Allow\",\n    \"Principal\": {\"Service\"\
                : \"eks.amazonaws.com\"},\n    \"Action\": \"sts:AssumeRole\"\n  }]\n\
                }\n"
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-cluster-role'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags["team"]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags["environment"]
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: cluster-role-attachment
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-cluster-role-attachment'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.roleRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-cluster-role'
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: nodegroup-policy-workernode
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-node-policy-workernode'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.roleRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-node-role'
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: nodegroup-policy-cni
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-node-policy-cni'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.roleRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-node-role'
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: nodegroup-policy-registry
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: 
                arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-node-policy-registry'
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.roleRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-node-role'
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: oidc-provider
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: OpenIDConnectProvider
          spec:
            forProvider:
              clientIdList:
              - sts.amazonaws.com
              url: ''
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["backstage.io/owned"]
          toFieldPath: spec.forProvider.tags["backstage.io/owned"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["backstage.io/team"]
          toFieldPath: spec.forProvider.tags["backstage.io/team"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["environment"]
          toFieldPath: spec.forProvider.tags["environment"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["managed-by"]
          toFieldPath: spec.forProvider.tags["managed-by"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["provisioned-by"]
          toFieldPath: spec.forProvider.tags["provisioned-by"]
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-oidc'
        - type: FromCompositeFieldPath
          fromFieldPath: status.oidcIssuer
          toFieldPath: spec.forProvider.url
          policy:
            fromFieldPath: Required
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.arn
          toFieldPath: status.oidcProviderArn
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: ebs-csi-role
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Role
          spec:
            forProvider:
              assumeRolePolicyDocument: ''
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["backstage.io/owned"]
          toFieldPath: spec.forProvider.tags["backstage.io/owned"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["backstage.io/team"]
          toFieldPath: spec.forProvider.tags["backstage.io/team"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["environment"]
          toFieldPath: spec.forProvider.tags["environment"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["managed-by"]
          toFieldPath: spec.forProvider.tags["managed-by"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["provisioned-by"]
          toFieldPath: spec.forProvider.tags["provisioned-by"]
        - type: CombineFromComposite
          combine:
            variables:
            - fromFieldPath: spec.parameters.clusterName
            - fromFieldPath: spec.parameters.enableEbsCsi
            strategy: string
            string:
              fmt: '%s|%v'
          toFieldPath: metadata.name
          transforms:
          - type: match
            match:
              patterns:
              - type: regexp
                regexp: ^(.*)\|true$
                result: \1-ebs-role
              fallbackValue: ''
          policy:
            fromFieldPath: Required
        - type: CombineFromComposite
          combine:
            variables:
            - fromFieldPath: status.oidcProviderArn
            - fromFieldPath: status.oidcIssuer
            - fromFieldPath: spec.parameters.enableEbsCsi
            strategy: string
            string:
              fmt: '%s|%s|%v'
          toFieldPath: spec.forProvider.assumeRolePolicyDocument
          transforms:
          - type: match
            match:
              patterns:
              - type: regexp
                regexp: ^(.*)\|https://(.*)\|true$
                result: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Federated":"\1"},"Action":"sts:AssumeRoleWithWebIdentity","Condition":{"StringEquals":{"\2:sub":"system:serviceaccount:kube-system:ebs-csi-controller-sa","\2:aud":"sts.amazonaws.com"}}}]}'
              fallbackValue: ''
          policy:
            fromFieldPath: Required
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.arn
          toFieldPath: status.ebsRoleArn
        - type: PatchSet
          patchSetName: mandatory-tags
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: ebs-csi-role-attachment
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: 
                arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
              role: ''
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.enableEbsCsi
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%v'
          - type: match
            match:
              patterns:
              - type: literal
                literal: 'true'
                result: 'true'
              fallbackValue: ''
          policy:
            fromFieldPath: Required
        - type: CombineFromComposite
          combine:
            variables:
            - fromFieldPath: spec.parameters.clusterName
            - fromFieldPath: spec.parameters.enableEbsCsi
            strategy: string
            string:
              fmt: '%s|%v'
          toFieldPath: metadata.name
          transforms:
          - type: match
            match:
              patterns:
              - type: regexp
                regexp: ^(.*)\|true$
                result: \1-ebs-attach
              fallbackValue: ''
          policy:
            fromFieldPath: Required
        - type: CombineFromComposite
          combine:
            variables:
            - fromFieldPath: spec.parameters.clusterName
            - fromFieldPath: spec.parameters.enableEbsCsi
            strategy: string
            string:
              fmt: '%s|%v'
          toFieldPath: spec.forProvider.role
          transforms:
          - type: match
            match:
              patterns:
              - type: regexp
                regexp: ^(.*)\|true$
                result: \1-ebs-role
              fallbackValue: ''
          policy:
            fromFieldPath: Required
        - type: PatchSet
          patchSetName: deletion-policy
        - type: PatchSet
          patchSetName: provider-config-ref
      - name: addon-vpc-cni
        base:
          apiVersion: eks.aws.upbound.io/v1beta1
          kind: Addon
          spec:
            forProvider:
              addonName: vpc-cni
              clusterName: ''
              resolveConflictsOnCreate: OVERWRITE
              resolveConflictsOnUpdate: OVERWRITE
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["backstage.io/owned"]
          toFieldPath: spec.forProvider.tags["backstage.io/owned"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["backstage.io/team"]
          toFieldPath: spec.forProvider.tags["backstage.io/team"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["environment"]
          toFieldPath: spec.forProvider.tags["environment"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["managed-by"]
          toFieldPath: spec.forProvider.tags["managed-by"]
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels["provisioned-by"]
          toFieldPath: spec.forProvider.tags["provisioned-by"]
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: '%s-vpc-cni'
        - fromFieldPath: spec.parameters.clusterName
          toFieldPath: spec.forProvider.clusterName
        - type: PatchSet
          patchSetName: mandatory-tags
