apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xeksclusters.platform.io
spec:
  group: platform.io
  names:
    kind: XEKSCluster
    plural: xeksclusters
  claimNames:
    kind: EKSCluster
    plural: eksclusters
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    clusterName:
                      type: string
                    region:
                      type: string
                      default: us-east-1
                    nodeInstanceType:
                      type: string
                      default: t3.medium
                    nodeCount:
                      type: integer
                      default: 2
                      minimum: 1
                      maximum: 10
                    kubernetesVersion:
                      type: string
                      default: "1.34"
                    environment:
                      type: string
                      enum: [dev, staging]
                    costCenter:
                      type: string
                      default: default
                    teamName:
                      type: string
                    enableEbsCsi:
                      type: boolean
                      default: true
                    enableClusterAutoscaler:
                      type: boolean
                      default: false
                    enableExternalDNS:
                      type: boolean
                      default: false
                    enableVelero:
                      type: boolean
                      default: false
                    adminRoleArn:
                      type: string
                      description: >
                        IAM role ARN that should receive cluster-admin access.
                        E.g. arn:aws:iam::123456789012:role/my-admin-role
                    networkRef:
                      type: string
                  required: [clusterName, teamName, networkRef]
                writeConnectionSecretToRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
              required: [parameters]
            status:
              type: object
              properties:
                oidcIssuer:
                  type: string
                  description: OIDC issuer URL for the EKS cluster
                oidcProviderArn:
                  type: string
                  description: ARN of the OIDC provider created for the cluster
  connectionSecretKeys:
    - kubeconfig
    - clusterEndpoint
    - clusterArn
