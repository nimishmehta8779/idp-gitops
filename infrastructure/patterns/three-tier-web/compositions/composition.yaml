apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: three-tier-web
  labels:
    pattern: three-tier-web
  annotations:
    idp.platform.io/pattern: three-tier-web
    idp.platform.io/pattern-version: 1.0.0
    idp.platform.io/depends-on: xnetworks.platform.io
    idp.platform.io/network-must-exist: 'true'
    idp.platform.io/lib-refs: _lib/iam/task-role-base.yaml, _lib/observability/cloudwatch-base.yaml
spec:
  compositeTypeRef:
    apiVersion: platform.io/v1alpha1
    kind: XThreeTierApp
  mode: Pipeline
  pipeline:
  - step: environment-configs
    functionRef:
      name: function-environment-configs
    input:
      apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
      kind: Input
      spec:
        environmentConfigs:
        - type: Selector
          selector:
            mode: Single
            matchLabels:
            - key: environment
              type: FromCompositeFieldPath
              valueFromFieldPath: spec.parameters.environment
  - step: patch-and-transform
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: sg-alb
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroup
          spec:
            forProvider:
              description: ALB security group - allows 80/443 from internet
              tags:
                tier: web
                managed-by: crossplane
                provisioned-by: backstage-idp
          metadata:
            labels:
              role: sg-alb
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.costCenter
          toFieldPath: spec.forProvider.tags[cost-center]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.networkRef
          toFieldPath: spec.forProvider.vpcIdSelector.matchLabels[network]
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.id
          toFieldPath: status.albSgId
        - &id001
          type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.providerConfigRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: aws-%s
      - name: sg-app
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroup
          spec:
            forProvider:
              description: App tier SG - ingress from ALB SG only
              tags:
                tier: app
                managed-by: crossplane
                provisioned-by: backstage-idp
          metadata:
            labels:
              role: sg-app
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.costCenter
          toFieldPath: spec.forProvider.tags[cost-center]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.networkRef
          toFieldPath: spec.forProvider.vpcIdSelector.matchLabels[network]
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.id
          toFieldPath: status.appSgId
        - *id001
      - name: sg-data
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroup
          spec:
            forProvider:
              description: Data tier SG - allows 5432 from app SG only
              tags:
                tier: data
                managed-by: crossplane
                provisioned-by: backstage-idp
          metadata:
            labels:
              role: sg-data
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.networkRef
          toFieldPath: spec.forProvider.vpcIdSelector.matchLabels[network]
        - *id001
      - name: sg-rule-alb-ingress-80
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroupRule
          spec:
            forProvider:
              type: ingress
              fromPort: 80
              toPort: 80
              protocol: tcp
              cidrBlocks:
              - 0.0.0.0/0
              securityGroupIdSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-alb
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - *id001
      - name: sg-rule-alb-ingress-443
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroupRule
          spec:
            forProvider:
              type: ingress
              fromPort: 443
              toPort: 443
              protocol: tcp
              cidrBlocks:
              - 0.0.0.0/0
              securityGroupIdSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-alb
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - *id001
      - name: sg-rule-alb-egress
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroupRule
          spec:
            forProvider:
              type: egress
              fromPort: 0
              toPort: 0
              protocol: '-1'
              cidrBlocks:
              - 0.0.0.0/0
              securityGroupIdSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-alb
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - *id001
      - name: sg-rule-app-ingress-alb
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroupRule
          spec:
            forProvider:
              type: ingress
              protocol: tcp
              securityGroupIdSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-app
              sourceSecurityGroupIdSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-alb
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.containerPort
          toFieldPath: spec.forProvider.fromPort
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.containerPort
          toFieldPath: spec.forProvider.toPort
        - *id001
      - name: sg-rule-app-egress
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroupRule
          spec:
            forProvider:
              type: egress
              fromPort: 0
              toPort: 0
              protocol: '-1'
              cidrBlocks:
              - 0.0.0.0/0
              securityGroupIdSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-app
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - *id001
      - name: sg-rule-data-ingress-app
        base:
          apiVersion: ec2.aws.upbound.io/v1beta1
          kind: SecurityGroupRule
          spec:
            forProvider:
              type: ingress
              fromPort: 5432
              toPort: 5432
              protocol: tcp
              securityGroupIdSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-data
              sourceSecurityGroupIdSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-app
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - *id001
      - name: ecs-task-execution-role
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Role
          spec:
            forProvider:
              assumeRolePolicy: "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\"\
                : [{\n    \"Effect\": \"Allow\",\n    \"Principal\": { \"Service\"\
                : \"ecs-tasks.amazonaws.com\" },\n    \"Action\": \"sts:AssumeRole\"\
                \n  }]\n}\n"
              tags:
                managed-by: crossplane
                iam-type: ecs-task-execution
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.costCenter
          toFieldPath: spec.forProvider.tags[cost-center]
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.arn
          toFieldPath: status.taskExecutionRoleArn
        - *id001
      - name: ecs-task-execution-policy
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: RolePolicyAttachment
          spec:
            forProvider:
              policyArn: arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        patches:
        - *id001
      - name: ecs-task-role
        base:
          apiVersion: iam.aws.upbound.io/v1beta1
          kind: Role
          spec:
            forProvider:
              assumeRolePolicy: "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\"\
                : [{\n    \"Effect\": \"Allow\",\n    \"Principal\": { \"Service\"\
                : \"ecs-tasks.amazonaws.com\" },\n    \"Action\": \"sts:AssumeRole\"\
                \n  }]\n}\n"
              tags:
                managed-by: crossplane
                iam-type: ecs-task
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.costCenter
          toFieldPath: spec.forProvider.tags[cost-center]
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.arn
          toFieldPath: status.taskRoleArn
        - *id001
      - name: log-group
        base:
          apiVersion: cloudwatchlogs.aws.upbound.io/v1beta1
          kind: Group
          spec:
            forProvider:
              tags:
                managed-by: crossplane
                provisioned-by: backstage-idp
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
            - fromFieldPath: spec.parameters.appName
            - fromFieldPath: spec.parameters.environment
            strategy: string
            string:
              fmt: /ecs/%s-%s
          toFieldPath: metadata.annotations[crossplane.io/external-name]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.retentionInDays
          transforms:
          - type: map
            map:
              dev: 7
              staging: 30
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.costCenter
          toFieldPath: spec.forProvider.tags[cost-center]
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.arn
          toFieldPath: status.logGroupArn
        - *id001
      - name: db-subnet-group
        base:
          apiVersion: rds.aws.upbound.io/v1beta1
          kind: SubnetGroup
          spec:
            forProvider:
              description: DB subnet group - data tier subnets from enterprise network
              subnetIdSelector:
                matchLabels: {}
              tags:
                managed-by: crossplane
                provisioned-by: backstage-idp
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.subnetIdSelector.matchLabels[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - *id001
      - name: rds-instance
        base:
          apiVersion: rds.aws.upbound.io/v1beta1
          kind: Instance
          spec:
            forProvider:
              engine: postgres
              engineVersion: '15.4'
              username: appuser
              allocatedStorage: 20
              storageType: gp3
              storageEncrypted: true
              publiclyAccessible: false
              autoMinorVersionUpgrade: true
              manageMasterUserPassword: true
              dbSubnetGroupNameSelector:
                matchControllerRef: true
              vpcSecurityGroupIdSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-data
              tags:
                managed-by: crossplane
                provisioned-by: backstage-idp
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.dbInstanceClass
          toFieldPath: spec.forProvider.instanceClass
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.costCenter
          toFieldPath: spec.forProvider.tags[cost-center]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.multiAz
          transforms:
          - type: map
            map:
              dev: false
              staging: true
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.deletionProtection
          transforms:
          - type: map
            map:
              dev: false
              staging: true
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.backupRetentionPeriod
          transforms:
          - type: map
            map:
              dev: 0
              staging: 7
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.endpoint
          toFieldPath: status.rdsEndpoint
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.port
          toFieldPath: status.rdsPort
        - *id001
        readinessChecks:
        - type: MatchString
          fieldPath: status.atProvider.dbInstanceStatus
          matchString: available
      - name: ecs-cluster
        base:
          apiVersion: ecs.aws.upbound.io/v1beta1
          kind: Cluster
          spec:
            forProvider:
              setting:
              - name: containerInsights
                value: enabled
              tags:
                managed-by: crossplane
                provisioned-by: backstage-idp
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.costCenter
          toFieldPath: spec.forProvider.tags[cost-center]
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.arn
          toFieldPath: status.ecsClusterArn
        - *id001
      - name: ecs-task-definition
        base:
          apiVersion: ecs.aws.upbound.io/v1beta1
          kind: TaskDefinition
          spec:
            forProvider:
              networkMode: awsvpc
              requiresCompatibilities:
              - FARGATE
              containerDefinitions: "[{\n  \"name\": \"web\",\n  \"image\": \"httpd:2.4\"\
                ,\n  \"cpu\": 256,\n  \"memory\": 512,\n  \"essential\": true,\n \
                \ \"portMappings\": [{\n    \"containerPort\": 8080,\n    \"hostPort\"\
                : 8080\n  }]\n}]\n"
              tags:
                managed-by: crossplane
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
            - fromFieldPath: spec.parameters.appName
            - fromFieldPath: spec.parameters.environment
            strategy: string
            string:
              fmt: '%s-%s'
          toFieldPath: spec.forProvider.family
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.ecsTaskCpu
          toFieldPath: spec.forProvider.cpu
          transforms:
          - type: convert
            convert:
              toType: string
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.ecsTaskMemory
          toFieldPath: spec.forProvider.memory
          transforms:
          - type: convert
            convert:
              toType: string
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - *id001
      - name: ecs-service
        base:
          apiVersion: ecs.aws.upbound.io/v1beta1
          kind: Service
          spec:
            forProvider:
              launchType: FARGATE
              clusterSelector:
                matchControllerRef: true
              taskDefinitionSelector:
                matchControllerRef: true
              networkConfiguration:
              - assignPublicIp: false
                subnetSelector:
                  matchLabels: {}
                securityGroupSelector:
                  matchControllerRef: true
                  matchLabels:
                    role: sg-app
              tags:
                managed-by: crossplane
                provisioned-by: backstage-idp
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.networkConfiguration[0].subnetSelector.matchLabels[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.desiredCount
          toFieldPath: spec.forProvider.desiredCount
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.costCenter
          toFieldPath: spec.forProvider.tags[cost-center]
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.id
          toFieldPath: status.ecsServiceArn
        - *id001
      - name: alb
        base:
          apiVersion: elbv2.aws.upbound.io/v1beta1
          kind: LB
          spec:
            forProvider:
              loadBalancerType: application
              internal: false
              subnetSelector:
                matchLabels: {}
              securityGroupSelector:
                matchControllerRef: true
                matchLabels:
                  role: sg-alb
              tags:
                managed-by: crossplane
                provisioned-by: backstage-idp
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.subnetSelector.matchLabels[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.costCenter
          toFieldPath: spec.forProvider.tags[cost-center]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.enableDeletionProtection
          transforms:
          - type: map
            map:
              dev: false
              staging: true
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.dnsName
          toFieldPath: status.albDnsName
        - *id001
      - name: alb-target-group
        base:
          apiVersion: elbv2.aws.upbound.io/v1beta1
          kind: LBTargetGroup
          spec:
            forProvider:
              protocol: HTTP
              targetType: ip
              vpcIdSelector:
                matchLabels: {}
              healthCheck:
              - healthyThreshold: 3
                unhealthyThreshold: 3
                interval: 30
                timeout: 5
              tags:
                managed-by: crossplane
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - type: CombineFromComposite
          combine:
            variables:
            - fromFieldPath: spec.parameters.appName
            - fromFieldPath: spec.parameters.environment
            strategy: string
            string:
              fmt: '%s-%s'
          toFieldPath: spec.forProvider.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.containerPort
          toFieldPath: spec.forProvider.port
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.healthCheckPath
          toFieldPath: spec.forProvider.healthCheck[0].path
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.networkRef
          toFieldPath: spec.forProvider.vpcIdSelector.matchLabels[network]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.teamName
          toFieldPath: spec.forProvider.tags[team]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.tags[environment]
        - *id001
      - name: alb-listener-http
        base:
          apiVersion: elbv2.aws.upbound.io/v1beta1
          kind: LBListener
          spec:
            forProvider:
              port: 80
              protocol: HTTP
              loadBalancerArnSelector:
                matchControllerRef: true
              defaultAction:
              - type: redirect
                redirect:
                - port: '443'
                  protocol: HTTPS
                  statusCode: HTTP_301
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - *id001
      - name: alb-listener-https
        base:
          apiVersion: elbv2.aws.upbound.io/v1beta1
          kind: LBListener
          spec:
            forProvider:
              port: 443
              protocol: HTTPS
              loadBalancerArnSelector:
                matchControllerRef: true
              defaultAction:
              - type: forward
                targetGroupArnSelector:
                  matchControllerRef: true
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.region
          toFieldPath: spec.forProvider.region
        - *id001
